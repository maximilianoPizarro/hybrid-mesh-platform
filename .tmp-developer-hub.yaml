      domain: hub-platform
      consumesApis:
        - kafka-iot-topics-api
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: machine-sensors-east
      title: Machine Sensors (East)
      description: IoT software sensors publishing MQTT telemetry
      annotations:
        backstage.io/kubernetes-namespace: industrial-edge-tst-all
        backstage.io/kubernetes-cluster: east
        backstage.io/kubernetes-id: machine-sensor
        backstage.io/kubernetes-label-selector: app=machine-sensor
        argocd/app-name: field-content-industrial-edge-tst
      tags:
        - east
    spec:
      type: service
