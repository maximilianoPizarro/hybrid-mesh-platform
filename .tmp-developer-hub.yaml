data:
  app-config.yaml: |
    app:
      title: Developer Hub
      baseUrl: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io
    backend:
      baseUrl: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io
      # Limit per-plugin DB pools — many dynamic plugins exhaust default PostgreSQL max_connections.
      database:
        knexConfig:
          pool:
            min: 0
            max: 4
            idleTimeoutMillis: 10000
            acquireTimeoutMillis: 30000
      auth:
        dangerouslyDisableDefaultAuthPolicy: true
      cors:
        origin: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io
      reading:
        allow:
          - host: "*.redhatworkshops.io"
          - host: "*.github.io"
          - host: raw.githubusercontent.com
          - host: github.com
          - host: "gitlab.apps.cluster-j2j5x.dynamic2.redhatworkshops.io"
          - host: petstore3.swagger.io
          - host: httpbin.org
          - host: catfact.ninja
          - host: restcountries.com
          - host: jsonplaceholder.typicode.com
      actions:
        pluginSources:
          - software-catalog-mcp-tool
          - techdocs-mcp-tool
    enabled:
      kubernetes: true
      argocd: true
      ocm: true
      kuadrant: true
    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: hub
              url: https://kubernetes.default.svc.cluster.local:443
              authProvider: serviceAccount
              serviceAccountToken: ${K8S_SA_TOKEN}
              skipTLSVerify: true
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      customResources:
