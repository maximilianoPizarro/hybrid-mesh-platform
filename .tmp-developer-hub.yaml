data:
  industrial-edge-system.yaml: |
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: industrial-edge
      title: Industrial Edge (Multi-Cluster)
      description: >
        IoT manufacturing platform across hub and east/west spokes — MQTT sensors,
        Kafka streaming, Camel integrations, ML anomaly detection, and centralized data lake.
      annotations:
        backstage.io/techdocs-ref: dir:/opt/app-root/src/techdocs/industrial-edge
        grafana/dashboard-selector: industrial-edge
      tags:
        - industrial-edge
        - multi-cluster
        - iot
    spec:
      owner: platform-engineering
      domain: hub-platform
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Domain
    metadata:
      name: hub-platform
      title: Hub Platform
      description: Centralized services on the ACM hub cluster
    spec:
      owner: platform-engineering
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Domain
    metadata:
      name: spoke-east
      title: East Spoke
      description: Industrial Edge workloads on the east managed cluster
    spec:
      owner: platform-engineering
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Domain
    metadata:
      name: spoke-west
      title: West Spoke
      description: Industrial Edge workloads on the west managed cluster
    spec:
      owner: platform-engineering
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: mqtt-sensor-api
      title: MQTT Sensor Topics
      description: Machine sensor telemetry over MQTT (AMQ Broker)
      tags:
        - mqtt
        - iot
    spec:
      type: asyncapi
      lifecycle: production
      owner: platform-engineering
      system: industrial-edge
      definition: |
        asyncapi: 2.6.0
        info:
          title: MQTT Sensor API
          version: 1.0.0
          description: |
            Machine sensor telemetry published over MQTT (AMQ Broker) from east/west spokes.
            Topics follow `iot-sensor/{site}/{metric}` convention.
        defaultContentType: application/json
        servers:
          mqtt-east:
            url: mqtt://messaging-industrial-edge-tst-all.cluster-east.example.com:443
            protocol: mqtt
            description: AMQ MQTT acceptor (east spoke)
          mqtt-west:
            url: mqtt://messaging-industrial-edge-tst-all.cluster-west.example.com:443
            protocol: mqtt
            description: AMQ MQTT acceptor (west spoke)
        components:
          schemas:
            TemperatureReading:
              type: object
              required: [sensorId, timestamp, value, unit]
              properties:
                sensorId:
                  type: string
                  example: machine-sensor-sw-01
                timestamp:
                  type: string
                  format: date-time
                  example: "2026-06-17T12:00:00Z"
                value:
                  type: number
                  format: float
                  minimum: -40
                  maximum: 200
                  example: 72.4
                unit:
                  type: string
                  enum: [celsius, fahrenheit]
                  example: celsius
                site:
                  type: string
                  example: sw
                line:
                  type: string
                  example: assembly-1
            VibrationReading:
              type: object
              required: [sensorId, timestamp, value, unit]
              properties:
                sensorId:
                  type: string
                  example: machine-sensor-sw-01
                timestamp:
                  type: string
                  format: date-time
                  example: "2026-06-17T12:00:00Z"
                value:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 50
                  example: 2.31
                unit:
                  type: string
                  enum: [mm/s, g]
                  example: mm/s
                axis:
                  type: string
                  enum: [x, y, z]
                  example: z
                site:
                  type: string
                  example: sw
        channels:
          iot-sensor/sw/temperature:
            description: South-west factory line temperature telemetry
            publish:
              summary: Publish temperature reading
              message:
                name: TemperatureReading
                contentType: application/json
                payload:
                  $ref: "#/components/schemas/TemperatureReading"
          iot-sensor/sw/vibration:
            description: South-west factory line vibration telemetry
            publish:
              summary: Publish vibration reading
              message:
                name: VibrationReading
                contentType: application/json
                payload:
                  $ref: "#/components/schemas/VibrationReading"
          iot-sensor/east/temperature:
            description: East spoke temperature telemetry
            publish:
              message:
                payload:
                  $ref: "#/components/schemas/TemperatureReading"
          iot-sensor/west/temperature:
            description: West spoke temperature telemetry
            publish:
              message:
                payload:
                  $ref: "#/components/schemas/TemperatureReading"
    
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: kafka-iot-topics-api
      title: Kafka IoT Topics
      description: Temperature and vibration streams on dev-cluster / prod-cluster
      tags:
        - kafka
      links:
        - url: https://kafka-console.apps.cluster-j2j5x.dynamic2.redhatworkshops.io
          title: Kafka Console (hub)
          icon: dashboard
    spec:
      type: asyncapi
      lifecycle: production
      owner: platform-engineering
      system: industrial-edge
      definition: |
        asyncapi: 2.6.0
        info:
          title: Kafka IoT Topics
          version: 1.0.0
          description: |
            Temperature and vibration streams on Strimzi dev-cluster and prod-cluster Kafka.
            Camel K routes MQTT → Kafka; data lake archiver writes to MinIO.
        defaultContentType: application/json
        servers:
          dev-cluster-east:
            url: dev-cluster-kafka-bootstrap.industrial-edge-tst-all.svc:9092
            protocol: kafka
            description: East dev-cluster (ingestion)
          prod-cluster-hub:
            url: prod-cluster-kafka-bootstrap.industrial-edge-data-lake.svc:9092
            protocol: kafka
            description: Hub prod-cluster (archive pipeline)
        components:
          schemas:
            TemperatureEvent:
              type: object
              required: [sensorId, timestamp, celsius]
              properties:
                sensorId:
                  type: string
                timestamp:
                  type: string
                  format: date-time
                celsius:
                  type: number
                  format: float
                  minimum: -40
                  maximum: 200
                site:
                  type: string
                partitionKey:
                  type: string
            VibrationEvent:
              type: object
              required: [sensorId, timestamp, mmPerSec]
              properties:
                sensorId:
                  type: string
                timestamp:
                  type: string
                  format: date-time
                mmPerSec:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 50
                axis:
                  type: string
                  enum: [x, y, z]
            ArchiveRecord:
              type: object
              properties:
                topic:
                  type: string
                partition:
                  type: integer
                offset:
                  type: integer
                payload:
                  type: object
                archivedAt:
                  type: string
                  format: date-time
                s3Key:
                  type: string
                  description: Object key in MinIO data lake bucket
        channels:
          temperature:
            description: Sensor temperature readings (dev-cluster)
            subscribe:
              summary: Line dashboard / ML consumers
              message:
                name: TemperatureEvent
                payload:
                  $ref: "#/components/schemas/TemperatureEvent"
            publish:
              summary: Camel mqtt-to-kafka route
              message:
                payload:
                  $ref: "#/components/schemas/TemperatureEvent"
          vibration:
            description: Sensor vibration readings (dev-cluster)
            subscribe:
              message:
                payload:
                  $ref: "#/components/schemas/VibrationEvent"
            publish:
              message:
                payload:
                  $ref: "#/components/schemas/VibrationEvent"
          industrial-edge-archive:
            description: Archived telemetry batches in data lake pipeline
            publish:
              summary: Kafka-to-S3 Camel archiver
              message:
                name: ArchiveRecord
                payload:
                  $ref: "#/components/schemas/ArchiveRecord"
    
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: s3-data-lake-api
      title: MinIO S3 Data Lake
      description: Object storage for Kubecost ETL and IE archives (hub-centralized)
    spec:
      type: openapi
      lifecycle: production
      owner: platform-engineering
      system: industrial-edge
      definition: |
        openapi: 3.0.3
        info:
          title: MinIO S3 Data Lake API
          version: 1.0.0
          description: |
            S3-compatible object storage on the hub for ML models, Kubecost ETL, and
            Industrial Edge telemetry archives. Use MinIO Console for bucket management.
        servers:
          - url: https://minio-console-industrial-edge-ml-workspace.apps.cluster-j2j5x.dynamic2.redhatworkshops.io
            description: MinIO Console (hub)
          - url: http://minio-hub.service-interconnect.svc:9000
            description: In-cluster S3 endpoint
        components:
          schemas:
            Bucket:
              type: object
              properties:
                name:
                  type: string
                  example: industrial-edge-archive
                creationDate:
                  type: string
                  format: date-time
            ObjectMetadata:
              type: object
              properties:
                key:
                  type: string
                  example: telemetry/2026/06/17/temperature.jsonl
                size:
                  type: integer
                  format: int64
                  example: 4096
                etag:
                  type: string
                lastModified:
                  type: string
                  format: date-time
                contentType:
                  type: string
                  example: application/x-ndjson
            ListBucketsResponse:
              type: object
              properties:
                buckets:
                  type: array
                  items:
                    $ref: "#/components/schemas/Bucket"
            ListObjectsResponse:
              type: object
              properties:
                name:
                  type: string
                prefix:
                  type: string
                objects:
                  type: array
                  items:
                    $ref: "#/components/schemas/ObjectMetadata"
            Error:
              type: object
              properties:
                code:
                  type: string
                message:
                  type: string
        paths:
          /minio/health/live:
            get:
              summary: MinIO liveness probe
              operationId: minioHealthLive
              responses:
                "200":
                  description: MinIO is healthy
          /minio/health/ready:
            get:
              summary: MinIO readiness probe
              operationId: minioHealthReady
              responses:
                "200":
                  description: MinIO is ready to serve
          /:
            get:
              summary: List buckets (S3 ListBuckets)
              operationId: listBuckets
              responses:
                "200":
                  description: Bucket list
                  content:
                    application/xml:
                      schema:
                        type: string
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ListBucketsResponse"
          /{bucket}:
            get:
              summary: List objects in bucket
              operationId: listObjects
              parameters:
                - name: bucket
                  in: path
                  required: true
                  schema:
                    type: string
                  example: industrial-edge-archive
                - name: prefix
                  in: query
                  schema:
                    type: string
                  example: telemetry/2026/
              responses:
                "200":
                  description: Object listing
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ListObjectsResponse"
          /{bucket}/{objectKey}:
            get:
              summary: Get object metadata or download
              operationId: getObject
              parameters:
                - name: bucket
                  in: path
                  required: true
                  schema:
                    type: string
                - name: objectKey
                  in: path
                  required: true
                  schema:
                    type: string
                  example: models/anomaly-detection/v1.onnx
              responses:
                "200":
                  description: Object body or metadata
                  content:
                    application/octet-stream:
                      schema:
                        type: string
                        format: binary
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ObjectMetadata"
                "404":
                  description: Object not found
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Error"
            put:
              summary: Upload object (S3 PutObject)
              operationId: putObject
              parameters:
                - name: bucket
                  in: path
                  required: true
                  schema:
                    type: string
                - name: objectKey
                  in: path
                  required: true
                  schema:
                    type: string
              requestBody:
                content:
                  application/octet-stream:
                    schema:
                      type: string
                      format: binary
              responses:
                "200":
                  description: Object stored
            delete:
              summary: Delete object
              operationId: deleteObject
              parameters:
                - name: bucket
                  in: path
                  required: true
                  schema:
                    type: string
                - name: objectKey
                  in: path
                  required: true
                  schema:
                    type: string
              responses:
                "204":
                  description: Object deleted
    
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: hub-gateway
