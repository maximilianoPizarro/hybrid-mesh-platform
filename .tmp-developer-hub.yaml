# Source: developer-hub/templates/lightspeed.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: developer-hub-lightspeed-ai-sync
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  template:
    spec:
      serviceAccountName: developer-hub-lightspeed-ai-sync
      restartPolicy: OnFailure
      containers:
        - name: sync
          image: "registry.redhat.io/openshift4/ose-cli:latest"
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              SRC_NS="kairos-system"
              SRC="kairos-ai-credentials"
              KEY="api-key"

              if ! oc get secret "$SRC" -n "$SRC_NS" >/dev/null 2>&1; then
                echo "ERROR: Secret ${SRC_NS}/${SRC} not found — create maas-facilitator-seed in vault namespace"
                exit 1
              fi

              API_KEY="$(oc get secret "$SRC" -n "$SRC_NS" -o json | python3 -c "import sys,json,base64; d=json.load(sys.stdin)['data']; print(base64.b64decode(d['${KEY}']).decode())")"
              if [ -z "$API_KEY" ] || [ "$API_KEY" = "CHANGEME-inject-via-RHDP" ]; then
                echo "ERROR: Empty or placeholder api key in ${SRC_NS}/${SRC}."
                exit 1
              fi
              oc patch secret llama-stack-secrets -n developer-hub --type merge \
                -p "{\"stringData\":{\"VLLM_API_KEY\":\"${API_KEY}\"}}"
              echo "Synced VLLM_API_KEY from Kairos credentials."
