# Source: developer-hub/templates/catalog-public-apis.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-catalog-public-apis
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  public-apis.yaml: |
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: public-api-demos
      title: Public API Demos
      description: Well-known public REST APIs with OpenAPI specs — Try It Out enabled in Developer Hub
      tags:
        - openapi
        - public
        - demo
    spec:
      owner: platform-engineering
      domain: hub-platform
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: petstore-api
      title: Swagger Petstore (Public)
      description: Classic OpenAPI 3 reference API — CORS enabled, Try It Out works in browser
      tags:
        - openapi
        - public
        - demo
      links:
        - url: https://petstore3.swagger.io/
          title: Live API
          icon: web
    spec:
      type: openapi
      lifecycle: production
      owner: platform-engineering
      system: public-api-demos
      definition:
        $text: https://petstore3.swagger.io/api/v3/openapi.json
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: httpbin-api
      title: httpbin.org (Public)
      description: HTTP request/response testing service — full CORS, no auth for GET
      tags:
        - openapi
        - public
        - demo
      links:
        - url: https://httpbin.org
          title: Live API
          icon: web
    spec:
      type: openapi
      lifecycle: production
      owner: platform-engineering
      system: public-api-demos
      definition: |
        openapi: 3.0.3
        info:
          title: httpbin.org
          version: 1.0.0
          description: HTTP request/response testing service — no auth required for Try It Out
        servers:
          - url: https://httpbin.org
        components:
          schemas:
            HttpbinArgs:
              type: object
              properties:
                args:
                  type: object
                  additionalProperties:
                    type: string
                headers:
                  type: object
                  additionalProperties:
                    type: string
                origin:
                  type: string
                url:
                  type: string
            HttpbinPostResponse:
              allOf:
                - $ref: "#/components/schemas/HttpbinArgs"
                - type: object
                  properties:
                    data:
                      type: string
                    json:
                      type: object
                    form:
                      type: object
        paths:
          /get:
            get:
              summary: Returns GET request data
              operationId: getRequest
              parameters:
                - name: show_env
                  in: query
                  schema:
                    type: integer
                    enum: [0, 1]
              responses:
                "200":
                  description: Echo of GET request
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/HttpbinArgs"
                      example:
                        args: { workshop: demo }
                        headers:
                          Accept: "application/json"
                        origin: "203.0.113.1"
                        url: "https://httpbin.org/get?workshop=demo"
          /post:
            post:
              summary: Echo POST body
              operationId: postRequest
              requestBody:
                content:
                  application/json:
                    schema:
                      type: object
                      additionalProperties: true
                    example:
                      message: hello httpbin
              responses:
                "200":
                  description: Echo of POST request
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/HttpbinPostResponse"
          /headers:
            get:
              summary: Return request headers
              operationId: getHeaders
              responses:
                "200":
                  description: Request headers
                  content:
                    application/json:
                      schema:
                        type: object
                        properties:
                          headers:
                            type: object
                            additionalProperties:
                              type: string
          /status/{code}:
            get:
              summary: Returns given HTTP status code
              operationId: getStatus
              parameters:
                - name: code
                  in: path
                  required: true
                  schema:
                    type: integer
                    minimum: 100
                    maximum: 599
                  example: 418
              responses:
                "200":
                  description: Status 200
                "418":
                  description: I'm a teapot
                "500":
                  description: Internal Server Error
          /delay/{seconds}:
            get:
              summary: Delay then respond
              operationId: getDelay
              parameters:
                - name: seconds
                  in: path
                  required: true
                  schema:
                    type: integer
                    minimum: 0
                    maximum: 10
              responses:
                "200":
                  description: Delayed response
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/HttpbinArgs"
    
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: restcountries-api
      title: REST Countries (Public)
      description: Country metadata REST API — open CORS, simple GET endpoints
      tags:
        - openapi
        - public
        - demo
      links:
        - url: https://restcountries.com
          title: Live API
          icon: web
    spec:
      type: openapi
      lifecycle: production
      owner: platform-engineering
      system: public-api-demos
      definition: |
        openapi: 3.0.3
        info:
          title: REST Countries API
          version: 3.1.0
          description: Get country data by name, code, or region — open CORS
        servers:
          - url: https://restcountries.com/v3.1
        components:
          schemas:
            CountryName:
              type: object
              properties:
                common:
                  type: string
                official:
                  type: string
            Country:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/CountryName"
                cca2:
                  type: string
                cca3:
                  type: string
                capital:
                  type: array
                  items:
                    type: string
                region:
                  type: string
                subregion:
                  type: string
                population:
                  type: integer
                flags:
                  type: object
                  properties:
                    png:
                      type: string
                      format: uri
                    svg:
                      type: string
                      format: uri
        paths:
          /all:
            get:
              summary: Get all countries
              operationId: getAllCountries
              parameters:
                - name: fields
                  in: query
                  schema:
                    type: string
                  example: name,cca2,region
              responses:
                "200":
                  description: List of countries
                  content:
                    application/json:
                      schema:
                        type: array
                        items:
                          $ref: "#/components/schemas/Country"
          /name/{name}:
            get:
              summary: Search countries by name
              operationId: getCountryByName
              parameters:
                - name: name
                  in: path
                  required: true
                  schema:
                    type: string
                  example: germany
              responses:
                "200":
                  description: Matching countries
                  content:
                    application/json:
                      schema:
                        type: array
                        items:
                          $ref: "#/components/schemas/Country"
                  "404":
                    description: Not found
          /alpha/{code}:
            get:
              summary: Get country by ISO alpha code
              operationId: getCountryByCode
              parameters:
                - name: code
                  in: path
                  required: true
                  schema:
                    type: string
                    minLength: 2
                    maxLength: 3
                  example: DE
              responses:
                "200":
                  description: Country details
                  content:
                    application/json:
                      schema:
                        type: array
                        items:
                          $ref: "#/components/schemas/Country"
          /region/{region}:
            get:
              summary: Get countries by region
              operationId: getCountriesByRegion
              parameters:
                - name: region
                  in: path
                  required: true
                  schema:
                    type: string
                    enum: [Africa, Americas, Asia, Europe, Oceania, Antarctic]
                  example: Europe
              responses:
                "200":
                  description: Countries in region
                  content:
                    application/json:
                      schema:
                        type: array
                        items:
                          $ref: "#/components/schemas/Country"
    
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: jsonplaceholder-api
      title: JSONPlaceholder (Public)
      description: Fake REST API for testing CRUD — CORS enabled
      tags:
        - openapi
        - public
        - demo
      links:
        - url: https://jsonplaceholder.typicode.com
          title: Live API
          icon: web
    spec:
      type: openapi
      lifecycle: production
      owner: platform-engineering
      system: public-api-demos
      definition: |
        openapi: 3.0.3
        info:
          title: JSONPlaceholder
          version: 1.0.0
          description: Fake online REST API for testing and prototyping — CORS enabled
        servers:
          - url: https://jsonplaceholder.typicode.com
        components:
          schemas:
            Post:
              type: object
              properties:
                userId:
                  type: integer
                id:
                  type: integer
                title:
                  type: string
                body:
                  type: string
              example:
                userId: 1
                id: 1
                title: Hybrid Mesh demo post
                body: JSONPlaceholder fake data for Developer Hub Try It Out
            User:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
                username:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                website:
                  type: string
            Comment:
              type: object
              properties:
                postId:
                  type: integer
                id:
                  type: integer
                name:
                  type: string
                email:
                  type: string
                body:
                  type: string
        paths:
          /posts:
            get:
              summary: List posts
              operationId: listPosts
              responses:
                "200":
                  description: Array of posts
                  content:
                    application/json:
                      schema:
                        type: array
                        items:
                          $ref: "#/components/schemas/Post"
            post:
              summary: Create a post (fake — not persisted)
              operationId: createPost
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: object
                      required: [title, body, userId]
                      properties:
                        title:
                          type: string
                        body:
                          type: string
                        userId:
                          type: integer
                    example:
                      title: New workshop post
                      body: Created via Swagger Try It Out
                      userId: 1
              responses:
                "201":
                  description: Created post (simulated)
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Post"
          /posts/{id}:
            get:
              summary: Get post by ID
              operationId: getPost
              parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                    type: integer
                  example: 1
              responses:
                "200":
                  description: Post details
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Post"
                "404":
                  description: Post not found
          /users:
            get:
              summary: List users
              operationId: listUsers
              responses:
                "200":
                  description: Array of users
                  content:
                    application/json:
                      schema:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
          /users/{id}:
            get:
              summary: Get user by ID
              operationId: getUser
              parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                    type: integer
              responses:
                "200":
                  description: User details
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/User"
          /posts/{id}/comments:
            get:
              summary: Comments for a post
              operationId: getPostComments
              parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                    type: integer
              responses:
                "200":
                  description: Comments
                  content:
                    application/json:
                      schema:
                        type: array
                        items:
                          $ref: "#/components/schemas/Comment"
    
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: cat-facts-api
      title: Cat Facts (Public)
      description: Random cat facts API — open CORS, no auth
      tags:
        - openapi
        - public
        - demo
      links:
        - url: https://catfact.ninja
          title: Live API
          icon: web
    spec:
      type: openapi
      lifecycle: production
      owner: platform-engineering
      system: public-api-demos
      definition: |
        openapi: 3.0.3
        info:
          title: Cat Facts API
          version: 1.0.0
          description: Returns random cat facts — open CORS, no auth
        servers:
          - url: https://catfact.ninja
        components:
          schemas:
            CatFact:
              type: object
              properties:
                fact:
                  type: string
                  example: Cats spend approximately 30% of their waking hours grooming themselves.
                length:
                  type: integer
                  example: 72
            CatFactsList:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/CatFact"
                current_page:
                  type: integer
                last_page:
                  type: integer
                per_page:
                  type: integer
                total:
                  type: integer
        paths:
          /fact:
            get:
              summary: Get a random cat fact
              operationId: getRandomFact
              parameters:
                - name: max_length
                  in: query
                  schema:
                    type: integer
                    minimum: 1
                  description: Maximum character length of the fact
                  example: 100
              responses:
                "200":
                  description: A cat fact
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/CatFact"
          /facts:
            get:
              summary: Get multiple cat facts (paginated)
              operationId: getFacts
              parameters:
                - name: limit
                  in: query
                  schema:
                    type: integer
                    minimum: 1
                    maximum: 50
                  example: 5
                - name: page
                  in: query
                  schema:
                    type: integer
                    minimum: 1
                  example: 1
              responses:
                "200":
                  description: Paginated list of cat facts
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/CatFactsList"
