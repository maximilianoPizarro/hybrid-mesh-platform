  docs/create-component.md: |
    # Create an Industrial Edge component
    
    ## From Developer Hub
    
    1. Sign in to Developer Hub.
    2. Go to **Create** → **Industrial Edge: IoT Manufacturing (Multi-Cluster)**.
    3. Fill in:
       - **Instance name** — e.g. `edge-factory-1`
       - **Owner** — defaults to your catalog user (`user1`)
       - **Target cluster** — `east` or `west`
       - **Hub cluster apps domain** — hub apps domain (for Gitea URLs)
       - **Spoke apps domain** — auto-filled when you pick east/west
    4. Run the template.
    
    ## What happens
    
    1. Skeleton is generated and pushed to Gitea: `ws-<owner>/<name>-<cluster>`.
    2. A catalog **Component** is registered with Kubernetes/Topology annotations.
    3. An Argo CD **Application** is created on the hub targeting the spoke.
    4. Manifests sync into namespace `ie-<name>-<cluster>` on the spoke.
    
    ## Camel / Kaoto variant
    
    Use **Industrial Edge — Camel Routes (Kaoto + Continue AI)** for route editing in DevSpaces with Kaoto.
    
    ## Tips
    
    - Ensure your Gitea org exists (`ws-userN`) — provisioned by the platform Gitea setup job.
    - If DevSpaces link fails, verify you opened the spoke DevSpaces URL, not the hub.
    
  docs/index.md: |
    # Hybrid Mesh Platform — Workshop Onboarding
    
    Welcome to the **hub-spoke Industrial Edge** demo on OpenShift 4.20.
    
    ## What you get
    
    | Capability | Where |
    |------------|--------|
    | Developer Hub (scaffolder, catalog, topology) | `https://developer-hub.<hub-apps-domain>` |
    | Gitea org per user | `ws-<username>` on hub Gitea |
    | DevSpaces (east or west) | Chosen when you run a template |
    | Internal Quay registry | Org `workshop` — images from Tekton |
    | ACM, Kiali, Skupper | OpenShift console (hub) + entity links |
    
    ## Architecture
    
    ```text
    Hub (ACM, GitOps, Gitea, Quay, Developer Hub)
      ├── East spoke — Industrial Edge, DevSpaces, mesh
      └── West spoke — Industrial Edge, DevSpaces, mesh
    ```
    
    ## Quick start
    
    1. Read [Login](login.md) — credentials and URLs.
    2. Open **Developer Hub** → **Create** → **Industrial Edge** template.
    3. Pick **east** or **west**; your repo lands in Gitea and deploys via Argo CD.
    4. Use **Open in DevSpaces** on the catalog entity (spoke DevSpaces URL).
    5. See [Pipelines and Quay](pipelines.md) for builds; [Observability](observability.md) for ACM/Kiali/Skupper.
    
    ## Workshop users
    
    - Users: `user1` … `user50` (up to `user200` if enabled by admins)
    - Password (demo): `Welcome123!`
    - Same password for: OpenShift console (htpasswd), Developer Hub (Keycloak), Gitea, DevSpaces on the spoke where you work
    
  docs/kuadrant-apis.md: |
    # Kuadrant API keys (userN)
    
    Dedicated **workshop-apis** and **ai-gateway** Gateways expose ExternalName backends with Kuadrant API Products, PlanPolicy, and TokenRateLimit.
    
    ## Gateways
    
    | Gateway | Host | APIs |
    |---------|------|------|
    | **workshop-apis** | `https://workshop-apis.<hub-domain>/` | httpbin, REST Countries, MCP |
    | **ai-gateway** | `https://ai-gateway.<hub-domain>/` | MaaS LLM `/v1/chat/completions` |
    
    Console: **Platform Hub-Spoke → Workshop APIs (Kuadrant)** and **AI Gateway (MaaS + Kuadrant)**.
    
    ## API Products (Developer Hub → Kuadrant)
    
    | Product | Gateway | External backend |
    |---------|---------|------------------|
    | httpbin | workshop-apis | `httpbin.org` (ExternalName) |
    | REST Countries | workshop-apis | `restcountries.com` |
    | MCP Gateway | workshop-apis | `mcp-gateway-istio` (ExternalName → in-cluster) |
    | MaaS LLM | ai-gateway | MaaS RHDP (ExternalName) |
    
    ## Flow (Developer Hub)
    
    1. Log in as `userN` / `Welcome123!` or `platformadmin`
    2. **Option A — Kuadrant sidebar:** **Kuadrant** → **API Products** → click the **product name** → **Request API key** → choose plan
    3. **Option B — Catalog API entity:** **Catalog** → System **workshop-kuadrant-apis** → open an **API** (e.g. `workshop-maas-openapi`) → **Kuadrant** tab → **Request API key**
    4. **My API Keys** (Kuadrant sidebar) → copy key
    5. **Definition** tab on the same API entity for Swagger / curl examples
    6. Call with: `Authorization: APIKEY <your-key>`
    
    > Do **not** use the pencil (Edit) icon on API Products — use the product **name** or the Catalog **API** entity **Kuadrant** tab instead.
    
    ## Vault (optional)
    
    | Path | Purpose |
    |------|---------|
    | `secret/workshop/maas` | Upstream MaaS Bearer (platform) |
    | `secret/workshop/kuadrant/<user>/<product>` | Mirror consumer API keys for CI |
    
    Kuadrant keys live as K8s Secrets (`kuadrant.io/api-key`); Vault mirror is optional.
    
    ## Examples
    
    ```bash
    export KEY="<api-key-from-developer-hub>"
    export WORKSHOP="https://workshop-apis.<hub-domain>"
    export AI="https://ai-gateway.<hub-domain>"
    
    curl -H "Authorization: APIKEY $KEY" "$WORKSHOP/httpbin/get"
    curl -H "Authorization: APIKEY $KEY" "$WORKSHOP/countries/name/chile"
    curl -H "Authorization: APIKEY $KEY" -H "Content-Type: application/json" \
      -X POST "$AI/v1/chat/completions" \
      -d '{"model":"granite-3-2-8b-instruct","messages":[{"role":"user","content":"Hello"}],"max_tokens":50}'
    ```
    
    ## GitOps
    
    - Chart: `charts/all/workshop-kuadrant-apis/`
    - Day-2: Argo app `hub-post-install-bootstrap` (PostSync Jobs)
    - Catalog: System **workshop-kuadrant-apis** (Components + OpenAPI for Swagger)
    
  docs/login.md: |
    # Login guide
    
    ## Developer Hub (recommended entry)
    
    1. Open `https://developer-hub.<hub-apps-domain>`
    2. Sign in with **OIDC** (Keycloak).
    3. Username: `userN` (e.g. `user1`) — same as Gitea.
    4. Password: `Welcome123!` (demo default).
    
    ## OpenShift console (hub, east, west)
    
    Developer Hub uses **Keycloak (OIDC)**. The **OpenShift console** uses **htpasswd** — not the same login screen.
    
    1. Open the cluster console URL (hub, east, or west).
    2. On the login page, click **workshop-users** (not `rhbk`, not the default OpenShift login).
    3. Username: `user1` (or `user2`…`user50`, `platformadmin`).
    4. Password: `Welcome123!` (demo default).
    
    If login fails after choosing the wrong provider, sign out completely and try again with **workshop-users**.
    
    ### Console still fails (500 or “authentication error”)
    
    1. Confirm you chose **workshop-users** (not `rhbk`).
    2. Password is exactly `Welcome123!` (capital W, ends with `!`).
    3. Ask a **cluster-admin** to repair the secret (the setup Job needs `httpd` for bcrypt; `ose-cli` alone cannot generate hashes):
       ```bash
       oc apply -f scripts/fix-htpasswd-users-secret-job.yaml
       oc wait --for=condition=complete job/htpasswd-users-secret-fix -n openshift-gitops --timeout=3m
       oc logs job/htpasswd-users-secret-fix -n openshift-gitops --all-containers
       ```
       Run on **hub, east, and west**. The first line of the secret must start with `$2y$` (bcrypt), not `$6$`.
    4. If one user still fails after a secret refresh, stale identities can block login — admin runs:
       `oc get identities | grep workshop-users` then `oc delete identity '<name>'` for that user, and retry.
    
    Workshop users have **cluster-reader** on all clusters (view namespaces, workloads, routes; not cluster-admin).
    
    ## Gitea
    
    - URL: `https://gitlab.apps.<hub-apps-domain>`
    - User: `user1` (your workshop id)
    - Password: `Welcome123!`
    - Your org: `ws-user1` (repos created by the scaffolder land here)
    
    ## DevSpaces (east or west)
    
    DevSpaces runs **on the spoke** you selected in the template — not on the hub.
    
    - East: `https://devspaces.<east-apps-domain>`
    - West: `https://devspaces.<west-apps-domain>`
    - Login: same `userN` / `Welcome123!` via cluster htpasswd on that spoke.
    
    Use the **Open in DevSpaces** link on your catalog component so the correct spoke and Gitea repo are pre-filled.
    
  docs/observability.md: |
    # Observability and consoles
    
    ## From Developer Hub
    
    - **Overview** — OCM cluster cards (hub, east, west).
    - **Kubernetes** — workloads on the spoke selected in entity annotations.
    - **Topology** — mesh-aware graph when `backstage.io/kubernetes-cluster` is set.
    
    ## OpenShift console (hub)
    
    With **cluster-reader**, use the **Platform Hub-Spoke** application menu:
    
    | Link | Purpose |
    |------|---------|
    | ACM Clusters | Multicluster inventory |
    | Kiali Service Mesh | Hub mesh console |
    | Skupper Console | Service interconnect topology |
    | Grafana Dashboards | Platform metrics |
    | ACS Central | Vulnerability and policy |
    | Gitea | Source repos |
    | Quay Registry | Container images |
    
    ## Spoke consoles
    
    Kiali/Grafana links on spokes use the spoke apps domain (see console links deployed on each cluster).
    
    ## ACS in Developer Hub
    
    Entities with container images may show security data when the ACS / Security Insights plugin is enabled and Central is reachable from Developer Hub.
    
  docs/pipelines.md: |
    # Pipelines and Quay
    
    ## Tekton
    
    After your component syncs on the spoke:
    
    1. Open the entity in Developer Hub.
    2. Go to the **CI** tab (Tekton plugin).
    3. Watch `PipelineRun` for the build.
    
    Pipelines use **buildah** to push images to the internal registry:
    
    ```text
    quay-registry.<hub-apps-domain>/workshop/<your-unique-name>:latest
    ```
    
    ## Quay UI
    
    - Console menu: **Quay Registry** (hub).
    - Or Developer Hub **Quay** tab on the entity (when `quay.io/repository-slug: workshop/<name>` is set).
    
    Images are stored in the shared **`workshop`** organization — one robot account is used for all workshop pushes (simplifies permissions).
    
    ## Credentials
    
    The platform creates `quay-workshop-push` in your deployment namespace (from the scaffold manifests). Pipelines reference this secret for push and pull.
    
