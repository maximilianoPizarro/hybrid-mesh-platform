            - allow: [Component]
        - type: file
          target: /opt/app-root/src/catalog-data/public-apis/public-apis.yaml
          rules:
            - allow: [API, System]
        - type: file
          target: /opt/app-root/src/catalog-data/demos/hybrid-mesh-shared-demos.yaml
          rules:
            - allow: [System, Component]
        - type: file
          target: /opt/app-root/src/catalog-data/workshop-kuadrant/workshop-kuadrant-apis.yaml
          rules:
            - allow: [System, Component, API]
        - type: file
          target: /opt/app-root/src/catalog-data/openshift-ai/openshift-ai-workshop.yaml
          rules:
            - allow: [System, Component]
        - type: file
          target: /opt/app-root/src/catalog-data/ai-platform/ai-platform.yaml
          rules:
            - allow: [System, Component]
        - type: file
          target: /opt/app-root/src/catalog-data/cnv-workshop/cnv-workshop.yaml
          rules:
            - allow: [System, Component]
      providers:
        ocm:
          default:
            name: hub
            kubernetesPluginRef: hub
            url: https://kubernetes.default.svc.cluster.local:443
            skipTLSVerify: true
            owner: group:platform-engineering
            schedule:
              frequency: { minutes: 15 }
              timeout: { minutes: 10 }
        keycloakOrg:
          default:
            baseUrl: https://sso.apps.cluster-j2j5x.dynamic2.redhatworkshops.io
            loginRealm: backstage
            clientId: developer-hub-catalog
            clientSecret: ${OIDC_CLIENT_SECRET}
            schedule:
              frequency: { minutes: 30 }
              timeout: { minutes: 3 }
    argocd:
      appLocatorMethods:
        - type: config
          instances:
            - name: default
              url: https://openshift-gitops-server-openshift-gitops.apps.cluster-j2j5x.dynamic2.redhatworkshops.io
              token: ${K8S_SA_TOKEN}
    quay:
      baseUrl: https://quay-registry.apps.cluster-j2j5x.dynamic2.redhatworkshops.io
      dangerouslyAllowInsecureConnections: true
      skipTLSVerify: true
      uiUrl: https://quay-registry.apps.cluster-j2j5x.dynamic2.redhatworkshops.io
      apiUrl: https://quay-registry.apps.cluster-j2j5x.dynamic2.redhatworkshops.io
      readOnly: false
      defaultVisibility: public
      allowedRegistries: ['quay-registry.apps.cluster-j2j5x.dynamic2.redhatworkshops.io']
      allowedRepositories: ['workshop/*']
      allowedTags: ['latest', 'stable']
    techdocs:
      builder: local
      publisher:
        type: local
    techRadar:
      url: https://raw.githubusercontent.com/backstage/community/master/plugins/tech-radar-common/src/sampleTechRadarResponse.json
    mcpActions:
      servers:
        catalog:
          pluginSources:
            - software-catalog-mcp-tool
        techdocs:
          pluginSources:
            - techdocs-mcp-tool
    permission:
      enabled: true
      rbac:
        admin:
          users:
            - name: user:default/platformadmin
        pluginsWithPermission:
          - catalog
          - scaffolder
          - permission
          - kubernetes
          - ocm
          - techdocs
          - notifications
          - argocd
          - kuadrant
          - adoption-insights
          - lightspeed
        policies-csv-file: /opt/app-root/src/rbac-policy.csv
        policyFileReload: true
    signInPage: oidc
    proxy:
      endpoints:
        '/rhacs':
          target: https://central.stackrox.svc:443
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE']
          headers:
            Authorization: Bearer ${RHACS_API_TOKEN}
        '/gitlab':
          target: https://gitlab.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/api/v4
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE']
          headers:
            PRIVATE-TOKEN: ${GITLAB_TOKEN}
        '/quay':
          target: https://quay-registry.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/api/v1
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE', 'PATCH']
          changeOrigin: true
        '/k8s-api':
          target: https://kubernetes.default.svc
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE', 'PATCH']
          headers:
            Authorization: Bearer ${K8S_SA_TOKEN}
          changeOrigin: true
    integrations:
      gitlab:
        - host: gitlab.apps.cluster-j2j5x.dynamic2.redhatworkshops.io
          apiBaseUrl: https://gitlab.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/api/v4
          token: ${GITLAB_TOKEN}
      github:
        - host: github.com
          apiBaseUrl: https://api.github.com
          rawBaseUrl: https://raw.githubusercontent.com
    gitlab:
      default:
        baseUrl: https://gitlab.apps.cluster-j2j5x.dynamic2.redhatworkshops.io
        token: ${GITLAB_TOKEN}
    # -- Azure DevOps integration (uncomment when AZURE_TOKEN and AZURE_ORG are set) --
