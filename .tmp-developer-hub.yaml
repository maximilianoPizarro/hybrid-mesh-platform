          apiVersion: v1
          plural: grpcroutes
        - group: kafka.strimzi.io
          apiVersion: v1beta2
          plural: kafkas
        - group: kafka.strimzi.io
          apiVersion: v1beta2
          plural: kafkatopics
        - group: kafka.strimzi.io
          apiVersion: v1beta2
          plural: kafkausers
        - group: kafka.strimzi.io
          apiVersion: v1beta2
          plural: kafkaconnects
        - group: operators.coreos.com
          apiVersion: v1alpha1
          plural: subscriptions
        - group: argoproj.io
          apiVersion: v1alpha1
          plural: applications
        - group: kuadrant.io
          apiVersion: v1
          plural: authpolicies
        - group: kuadrant.io
          apiVersion: v1
          plural: ratelimitpolicies
        - group: kuadrant.io
          apiVersion: v1
          plural: tokenratelimitpolicies
        - group: devportal.kuadrant.io
          apiVersion: v1alpha1
          plural: apiproducts
        - group: devportal.kuadrant.io
          apiVersion: v1alpha1
          plural: apikeys
        - group: camel.apache.org
          apiVersion: v1
          plural: integrations
        - group: camel.apache.org
          apiVersion: v1
          plural: kamelets
        - group: camel.apache.org
          apiVersion: v1
          plural: pipes
    catalog:
