# Source: developer-hub/templates/catalog-workshop-kuadrant-apis.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-catalog-workshop-kuadrant-apis
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  workshop-kuadrant-apis.yaml: |
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: workshop-kuadrant-apis
      title: Workshop Kuadrant API Products
      description: |
        Dedicated **workshop-apis** and **ai-gateway** Gateways with Kuadrant API keys.
    
        1. Developer Hub → **Kuadrant** → **API Products** → click product name → **Request API key**
        2. Or open any **API** entity below → tab **Kuadrant** → **Request API key**
        3. Copy key from **Kuadrant → My API Keys**
        4. Call APIs with header `Authorization: APIKEY <key>`
      tags:
        - workshop
        - kuadrant
        - gateway-api
        - external-api
      links:
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/kuadrant
          title: Kuadrant — API Products & keys
          icon: catalog
    spec:
      owner: platform-engineering
      domain: hub-platform
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: workshop-apis-gateway
      title: Workshop APIs Gateway
      description: |
        Gateway API host `workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io` — httpbin, REST Countries, MCP.
    
        ```bash
        export KEY="<from Kuadrant → My API Keys>"
        curl -H "Authorization: APIKEY $KEY" https://workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/httpbin/get
        curl -H "Authorization: APIKEY $KEY" https://workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/countries/name/chile
        ```
      annotations:
        backstage.io/kubernetes-namespace: workshop-kuadrant-apis
        backstage.io/kubernetes-cluster: hub
        backstage.io/kubernetes-id: workshop-apis-gateway
        argocd/app-name: field-content-workshop-kuadrant-apis
      links:
        - url: https://workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/httpbin/get
          title: Gateway (401 without API key)
          icon: web
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/kuadrant
          title: Request API key
          icon: catalog
    spec:
      type: service
      lifecycle: production
      owner: platform-engineering
      system: workshop-kuadrant-apis
      domain: hub-platform
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: ai-gateway-maas
      title: AI Gateway — MaaS LLM
      description: |
        OpenAI-compatible MaaS at `ai-gateway.apps.cluster-j2j5x.dynamic2.redhatworkshops.io`.
    
        ```bash
        export KEY="<from Kuadrant → My API Keys>"
        curl -sk -H "Authorization: APIKEY $KEY" -H "Content-Type: application/json" \
          -X POST "https://ai-gateway.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/v1/chat/completions" \
          -d '{"model":"granite-3-2-8b-instruct","messages":[{"role":"user","content":"Hello"}],"max_tokens":50}'
        ```
      annotations:
        backstage.io/kubernetes-namespace: ai-gateway-system
        backstage.io/kubernetes-cluster: hub
        backstage.io/kubernetes-id: ai-gateway
        argocd/app-name: field-content-workshop-kuadrant-apis
        kuadrant.io/api-product: workshop-llm-tokens
      links:
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/kuadrant/api-products/ai-gateway-system/workshop-llm-tokens
          title: Request API key (MaaS LLM)
          icon: catalog
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/catalog/default/api/workshop-maas-openapi
          title: OpenAPI / Swagger
          icon: docs
    spec:
      type: service
      lifecycle: production
      owner: platform-engineering
      system: workshop-kuadrant-apis
      domain: hub-platform
      providesApis:
        - workshop-maas-openapi
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: workshop-httpbin-api
      title: httpbin API Product
      description: |
        External httpbin.org via workshop-apis + PlanPolicy (bronze/silver/gold).
    
        Request key: Kuadrant → **workshop-httpbin** → or API entity **workshop-httpbin-openapi** → Kuadrant tab.
    
        ```bash
        curl -H "Authorization: APIKEY $KEY" https://workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/httpbin/get
        ```
      annotations:
        backstage.io/kubernetes-namespace: workshop-kuadrant-apis
        backstage.io/kubernetes-id: workshop-ext-httpbin
        kuadrant.io/api-product: workshop-httpbin
      links:
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/kuadrant/api-products/workshop-kuadrant-apis/workshop-httpbin
          title: Request API key
          icon: catalog
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/catalog/default/api/workshop-httpbin-openapi
          title: Swagger
          icon: docs
    spec:
      type: service
      lifecycle: production
      owner: platform-engineering
      system: workshop-kuadrant-apis
      providesApis:
        - workshop-httpbin-openapi
      dependsOn:
        - component:workshop-apis-gateway
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: workshop-mcp-api
      title: MCP Gateway API Product
      description: |
        MCP Gateway (ArgoCD + k8s tools) via workshop-apis with API key auth.
    
        ```bash
        curl -H "Authorization: APIKEY $KEY" https://workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/mcp
        ```
      annotations:
        backstage.io/kubernetes-namespace: workshop-kuadrant-apis
        backstage.io/kubernetes-id: workshop-ext-mcp
        kuadrant.io/api-product: workshop-mcp-gateway
      links:
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/kuadrant/api-products/workshop-kuadrant-apis/workshop-mcp-gateway
          title: Request API key
          icon: catalog
    spec:
      type: service
      lifecycle: production
      owner: platform-engineering
      system: workshop-kuadrant-apis
      providesApis:
        - workshop-mcp-openapi
      dependsOn:
        - component:workshop-apis-gateway
        - component:workshop-mcp-gateway
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: workshop-restcountries-api
      title: REST Countries API Product
      description: |
        External restcountries.com via workshop-apis.
    
        ```bash
        curl -H "Authorization: APIKEY $KEY" https://workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/countries/name/chile
        ```
      annotations:
        kuadrant.io/api-product: workshop-restcountries
      links:
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/kuadrant/api-products/workshop-kuadrant-apis/workshop-restcountries
          title: Request API key
          icon: catalog
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/catalog/default/api/workshop-restcountries-openapi
          title: Swagger
          icon: docs
    spec:
      type: service
      lifecycle: production
      owner: platform-engineering
      system: workshop-kuadrant-apis
      providesApis:
        - workshop-restcountries-openapi
      dependsOn:
        - component:workshop-apis-gateway
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: workshop-httpbin-openapi
      title: httpbin (workshop-apis gateway)
      description: |
        Kuadrant-protected httpbin. Request key on this page (**Kuadrant** tab) or at `/kuadrant`.
    
        ```bash
        curl -H "Authorization: APIKEY $KEY" https://workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/httpbin/get
        ```
      tags: [kuadrant, external-api, workshop, swagger]
      annotations:
        kuadrant.io/api-product: workshop-httpbin
      links:
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/kuadrant/api-products/workshop-kuadrant-apis/workshop-httpbin
          title: Request API key
          icon: catalog
    spec:
      type: openapi
      lifecycle: production
      owner: platform-engineering
      system: workshop-kuadrant-apis
      definition: |
          openapi: 3.0.3
          info:
            title: httpbin (via workshop-apis)
            description: |
              Kuadrant-protected httpbin.org proxy. Request an API key in Developer Hub
              (**Kuadrant** tab on this entity or `/kuadrant`) and send `Authorization: APIKEY <key>`.
            version: v1
            contact:
              name: Platform Engineering
          servers:
            - url: https://workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/httpbin
              description: Workshop APIs Gateway (Kuadrant APIKEY required)
          security:
            - ApiKeyAuth: []
          components:
            securitySchemes:
              ApiKeyAuth:
                type: apiKey
                in: header
                name: Authorization
                description: "Kuadrant API key — format: `APIKEY <your-key>`"
            schemas:
              HttpbinArgs:
                type: object
                properties:
                  args:
                    type: object
                    additionalProperties:
                      type: string
                  headers:
                    type: object
                    additionalProperties:
                      type: string
                  origin:
                    type: string
                  url:
                    type: string
                example:
                  args: {}
                  headers:
                    Accept: "*/*"
                    Authorization: "APIKEY ***"
                  origin: "203.0.113.1"
                  url: "https://workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/httpbin/get"
              HttpbinPostResponse:
                allOf:
                  - $ref: "#/components/schemas/HttpbinArgs"
                  - type: object
                    properties:
                      data:
                        type: string
                      form:
                        type: object
                      json:
                        type: object
              HttpbinHeadersResponse:
                type: object
                properties:
                  headers:
                    type: object
                    additionalProperties:
                      type: string
              ErrorResponse:
                type: object
                properties:
                  message:
                    type: string
          paths:
            /get:
              get:
                summary: Echo GET request
                description: Returns the incoming request headers, query args, and origin IP.
                operationId: httpbinGet
                parameters:
                  - name: show_env
                    in: query
                    schema:
                      type: integer
                      enum: [0, 1]
                    description: Include environment variables in response (upstream httpbin)
                responses:
                  "200":
                    description: Echo of GET request
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/HttpbinArgs"
                        example:
                          args: { foo: bar }
                          headers:
                            Accept: "application/json"
                            Authorization: "APIKEY workshop-key"
                          origin: "203.0.113.1"
                          url: "https://workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/httpbin/get?foo=bar"
                  "401":
                    description: Missing or invalid APIKEY
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/ErrorResponse"
            /post:
              post:
                summary: Echo POST request
                description: Returns posted JSON, form data, and headers.
                operationId: httpbinPost
                requestBody:
                  required: false
                  content:
                    application/json:
                      schema:
                        type: object
                        additionalProperties: true
                      example:
                        workshop: hybrid-mesh
                        sensor: temperature
                    application/x-www-form-urlencoded:
                      schema:
                        type: object
                        additionalProperties:
                          type: string
                responses:
                  "200":
                    description: Echo of POST request
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/HttpbinPostResponse"
                  "401":
                    description: Missing or invalid APIKEY
            /headers:
              get:
                summary: Return request headers
                operationId: httpbinHeaders
                responses:
                  "200":
                    description: Request headers echoed
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/HttpbinHeadersResponse"
                        example:
                          headers:
                            Accept: "application/json"
                            Authorization: "APIKEY workshop-key"
                            Host: "workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io"
                  "401":
                    description: Missing or invalid APIKEY
            /status/{code}:
              get:
                summary: Return given HTTP status code
                operationId: httpbinStatus
                parameters:
                  - name: code
                    in: path
                    required: true
                    schema:
                      type: integer
                      minimum: 100
                      maximum: 599
                    example: 418
                responses:
                  "200":
                    description: Status 200
                  "401":
                    description: Missing or invalid APIKEY
                  "418":
                    description: I'm a teapot (example)
                  "500":
                    description: Internal Server Error (example)
            /delay/{seconds}:
              get:
                summary: Delay response
                description: Waits `seconds` before responding (max 10s upstream).
                operationId: httpbinDelay
                parameters:
                  - name: seconds
                    in: path
                    required: true
                    schema:
                      type: integer
                      minimum: 0
                      maximum: 10
                    example: 2
                responses:
                  "200":
                    description: Delayed echo response
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/HttpbinArgs"
                  "401":
                    description: Missing or invalid APIKEY
    
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: workshop-restcountries-openapi
      title: REST Countries (workshop-apis gateway)
      description: |
        Kuadrant-protected REST Countries proxy.
    
        ```bash
        curl -H "Authorization: APIKEY $KEY" https://workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/countries/name/chile
        ```
      tags: [kuadrant, external-api, workshop, swagger]
      annotations:
        kuadrant.io/api-product: workshop-restcountries
      links:
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/kuadrant/api-products/workshop-kuadrant-apis/workshop-restcountries
          title: Request API key
          icon: catalog
    spec:
      type: openapi
      lifecycle: production
      owner: platform-engineering
      system: workshop-kuadrant-apis
      definition: |
          openapi: 3.0.3
          info:
            title: REST Countries (via workshop-apis)
            description: |
              Kuadrant-protected REST Countries v3.1 proxy. Use `Authorization: APIKEY <key>`.
            version: v1
          servers:
            - url: https://workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/countries
              description: Workshop APIs Gateway
          security:
            - ApiKeyAuth: []
          components:
            securitySchemes:
              ApiKeyAuth:
                type: apiKey
                in: header
                name: Authorization
                description: "Kuadrant API key — format: `APIKEY <your-key>`"
            schemas:
              CountryName:
                type: object
                properties:
                  common:
                    type: string
                    example: Chile
                  official:
                    type: string
                    example: Republic of Chile
              Country:
                type: object
                properties:
                  name:
                    $ref: "#/components/schemas/CountryName"
                  cca2:
                    type: string
                    example: CL
                  cca3:
                    type: string
                    example: CHL
                  capital:
                    type: array
                    items:
                      type: string
                    example: ["Santiago"]
                  region:
                    type: string
                    example: Americas
                  subregion:
                    type: string
                    example: South America
                  population:
                    type: integer
                    example: 19212126
                  flags:
                    type: object
                    properties:
                      png:
                        type: string
                        format: uri
                      svg:
                        type: string
                        format: uri
              ErrorResponse:
                type: object
                properties:
                  message:
                    type: string
                    example: Country not found
          paths:
            /all:
              get:
                summary: Get all countries
                operationId: getAllCountries
                parameters:
                  - name: fields
                    in: query
                    schema:
                      type: string
                    description: Comma-separated field filter (e.g. name,capital,region)
                    example: name,cca2,region
                responses:
                  "200":
                    description: List of countries
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: "#/components/schemas/Country"
                  "401":
                    description: Missing or invalid APIKEY
            /name/{country}:
              get:
                summary: Search countries by name
                operationId: getCountryByName
                parameters:
                  - name: country
                    in: path
                    required: true
                    schema:
                      type: string
                    example: chile
                  - name: fullText
                    in: query
                    schema:
                      type: boolean
                    description: Match full country name only
                responses:
                  "200":
                    description: Matching countries
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: "#/components/schemas/Country"
                        example:
                          - name:
                              common: Chile
                              official: Republic of Chile
                            cca2: CL
                            region: Americas
                  "404":
                    description: Country not found
                  "401":
                    description: Missing or invalid APIKEY
            /alpha/{code}:
              get:
                summary: Get country by ISO alpha-2 or alpha-3 code
                operationId: getCountryByCode
                parameters:
                  - name: code
                    in: path
                    required: true
                    schema:
                      type: string
                      minLength: 2
                      maxLength: 3
                    example: CL
                responses:
                  "200":
                    description: Country details
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: "#/components/schemas/Country"
                  "404":
                    description: Country not found
                  "401":
                    description: Missing or invalid APIKEY
            /region/{region}:
              get:
                summary: Get countries by region
                operationId: getCountriesByRegion
                parameters:
                  - name: region
                    in: path
                    required: true
                    schema:
                      type: string
                      enum: [Africa, Americas, Asia, Europe, Oceania, Antarctic]
                    example: Americas
                responses:
                  "200":
                    description: Countries in region
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: "#/components/schemas/Country"
                  "401":
                    description: Missing or invalid APIKEY
    
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: workshop-maas-openapi
      title: MaaS LLM (ai-gateway)
      description: |
        OpenAI-compatible chat completions via ai-gateway. Request key on **Kuadrant** tab.
    
        ```bash
        curl -sk -H "Authorization: APIKEY $KEY" -H "Content-Type: application/json" \
          -X POST "https://ai-gateway.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/v1/chat/completions" \
          -d '{"model":"granite-3-2-8b-instruct","messages":[{"role":"user","content":"Hello"}],"max_tokens":50}'
        ```
      tags: [kuadrant, llm, maas, ai-gateway, swagger]
      annotations:
        kuadrant.io/api-product: workshop-llm-tokens
      links:
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/kuadrant/api-products/ai-gateway-system/workshop-llm-tokens
          title: Request API key
          icon: catalog
    spec:
      type: openapi
      lifecycle: production
      owner: platform-engineering
      system: workshop-kuadrant-apis
      definition: |
          openapi: 3.0.3
          info:
            title: MaaS LLM (ai-gateway)
            description: |
              OpenAI-compatible chat completions via Red Hat AI MaaS, protected by Kuadrant.
              Request key on the **Kuadrant** tab or `/kuadrant/api-products/ai-gateway-system/workshop-llm-tokens`.
            version: v1
          servers:
            - url: https://ai-gateway.apps.cluster-j2j5x.dynamic2.redhatworkshops.io
              description: AI Gateway (Kuadrant APIKEY required)
          security:
            - ApiKeyAuth: []
          components:
            securitySchemes:
              ApiKeyAuth:
                type: apiKey
                in: header
                name: Authorization
                description: "Kuadrant API key — format: `APIKEY <your-key>`"
            schemas:
              ChatMessage:
                type: object
                required: [role, content]
                properties:
                  role:
                    type: string
                    enum: [system, user, assistant, tool]
                  content:
                    type: string
              ChatCompletionRequest:
                type: object
                required: [model, messages]
                properties:
                  model:
                    type: string
                    description: Granite or other served model ID
                    example: granite-3-2-8b-instruct
                  messages:
                    type: array
                    minItems: 1
                    items:
                      $ref: "#/components/schemas/ChatMessage"
                  max_tokens:
                    type: integer
                    minimum: 1
                    maximum: 4096
                    example: 50
                  temperature:
                    type: number
                    minimum: 0
                    maximum: 2
                    example: 0.7
                  stream:
                    type: boolean
                    default: false
              ChatCompletionChoice:
                type: object
                properties:
                  index:
                    type: integer
                  message:
                    $ref: "#/components/schemas/ChatMessage"
                  finish_reason:
                    type: string
                    enum: [stop, length, content_filter]
              ChatCompletionUsage:
                type: object
                properties:
                  prompt_tokens:
                    type: integer
                  completion_tokens:
                    type: integer
                  total_tokens:
                    type: integer
              ChatCompletionResponse:
                type: object
                properties:
                  id:
                    type: string
                    example: chatcmpl-workshop-001
                  object:
                    type: string
                    example: chat.completion
                  created:
                    type: integer
                  model:
                    type: string
                  choices:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChatCompletionChoice"
                  usage:
                    $ref: "#/components/schemas/ChatCompletionUsage"
              Model:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                    example: model
                  owned_by:
                    type: string
              ModelList:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Model"
              ErrorResponse:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                      type:
                        type: string
          paths:
            /v1/chat/completions:
              post:
                summary: Create chat completion
                operationId: createChatCompletion
                requestBody:
                  required: true
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/ChatCompletionRequest"
                      example:
                        model: granite-3-2-8b-instruct
                        messages:
                          - role: user
                            content: Explain hybrid mesh in one sentence.
                        max_tokens: 50
                        temperature: 0.7
                responses:
                  "200":
                    description: Chat completion
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/ChatCompletionResponse"
                  "401":
                    description: Missing or invalid APIKEY
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/ErrorResponse"
                  "429":
                    description: Rate limit exceeded (Kuadrant PlanPolicy)
            /v1/models:
              get:
                summary: List available models
                operationId: listModels
                responses:
                  "200":
                    description: Model list
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/ModelList"
                        example:
                          object: list
                          data:
                            - id: granite-3-2-8b-instruct
                              object: model
                              owned_by: maas
                  "401":
                    description: Missing or invalid APIKEY
    
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: workshop-mcp-openapi
      title: MCP Gateway (workshop-apis)
      description: Streamable HTTP MCP — use MCP clients; API key via Kuadrant tab or `/kuadrant`.
      tags: [kuadrant, mcp, workshop]
      annotations:
        kuadrant.io/api-product: workshop-mcp-gateway
      links:
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/kuadrant/api-products/workshop-kuadrant-apis/workshop-mcp-gateway
          title: Request API key
          icon: catalog
    spec:
      type: openapi
      lifecycle: production
      owner: platform-engineering
      system: workshop-kuadrant-apis
      definition: |
          openapi: 3.0.3
          info:
            title: MCP Gateway proxy
            description: |
              Streamable HTTP MCP gateway (ArgoCD + Kubernetes tools) via workshop-apis.
              JSON-RPC 2.0 over HTTP POST. Kuadrant APIKEY required.
            version: v1
          servers:
            - url: https://workshop-apis.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/mcp
              description: MCP Gateway endpoint
          security:
            - ApiKeyAuth: []
          components:
            securitySchemes:
              ApiKeyAuth:
                type: apiKey
                in: header
                name: Authorization
                description: "Kuadrant API key — format: `APIKEY <your-key>`"
            schemas:
              JsonRpcRequest:
                type: object
                required: [jsonrpc, method, id]
                properties:
                  jsonrpc:
                    type: string
                    enum: ["2.0"]
                  method:
                    type: string
                    description: MCP method name
                    enum:
                      - initialize
                      - tools/list
                      - tools/call
                      - ping
                    example: tools/list
                  params:
                    type: object
                    additionalProperties: true
                  id:
                    oneOf:
                      - type: string
                      - type: integer
                    example: 1
              JsonRpcResponse:
                type: object
                required: [jsonrpc, id]
                properties:
                  jsonrpc:
                    type: string
                    enum: ["2.0"]
                  result:
                    type: object
                    additionalProperties: true
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
                  id:
                    oneOf:
                      - type: string
                      - type: integer
              McpTool:
                type: object
                properties:
                  name:
                    type: string
                    example: argocd_list_applications
                  description:
                    type: string
                  inputSchema:
                    type: object
              ToolsListResult:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      $ref: "#/components/schemas/McpTool"
          paths:
            /:
              post:
                summary: MCP JSON-RPC (Streamable HTTP)
                description: |
                  Send JSON-RPC requests for MCP protocol operations.
                  Typical flow: `initialize` → `tools/list` → `tools/call`.
                operationId: mcpJsonRpc
                requestBody:
                  required: true
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/JsonRpcRequest"
                      examples:
                        initialize:
                          summary: Initialize session
                          value:
                            jsonrpc: "2.0"
                            method: initialize
                            params:
                              protocolVersion: "2024-11-05"
                              capabilities: {}
                              clientInfo:
                                name: developer-hub
                                version: "1.0"
                            id: 1
                        toolsList:
                          summary: List available tools
                          value:
                            jsonrpc: "2.0"
                            method: tools/list
                            id: 2
                        toolsCall:
                          summary: Invoke a tool
                          value:
                            jsonrpc: "2.0"
                            method: tools/call
                            params:
                              name: argocd_list_applications
                              arguments: {}
                            id: 3
                responses:
                  "200":
                    description: JSON-RPC response
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/JsonRpcResponse"
                        examples:
                          toolsList:
                            value:
                              jsonrpc: "2.0"
                              id: 2
                              result:
                                tools:
                                  - name: argocd_list_applications
                                    description: List Argo CD applications
                                  - name: k8s_get_resources
                                    description: Query Kubernetes resources
                  "401":
                    description: Missing or invalid APIKEY
    
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: workshop-api-consumer
      title: Workshop API consumer (userN / platformadmin)
      description: |
        Any authenticated user (`user1`…`userN`, `platformadmin`) can request Kuadrant API keys.
    
        **Where to request keys:**
        - **Kuadrant** sidebar → API Products → click product **name** → Request API key
        - **Catalog** → API entity (below) → **Kuadrant** tab → Request API key
        - **My API Keys** in Kuadrant sidebar to copy keys
      tags: [kuadrant, workshop, onboarding]
      links:
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/kuadrant
          title: Kuadrant — API Products / My API Keys
          icon: catalog
        - url: https://developer-hub.apps.cluster-j2j5x.dynamic2.redhatworkshops.io/catalog/default/system/workshop-kuadrant-apis
          title: System — all workshop APIs
          icon: catalog
    spec:
      type: website
      lifecycle: production
      owner: user1
      system: workshop-kuadrant-apis
      consumesApis:
        - workshop-httpbin-openapi
        - workshop-maas-openapi
        - workshop-mcp-openapi
        - workshop-restcountries-openapi
