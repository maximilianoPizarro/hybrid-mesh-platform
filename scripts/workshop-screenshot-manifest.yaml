# Workshop hero screenshot sources — hub cluster live UI only.
# Hub domain from: oc get ingresses.config/cluster -o jsonpath='{.spec.domain}'
hub_domain: apps.cluster-22jv2.dynamic2.redhatworkshops.io
viewport:
  width: 1440
  height: 900
output_width: 960

# auth: Console token via oc whoami -t (pre-login session in browser)
auth:
  console_url: "https://console-openshift-console.{hub_domain}/"
  devhub_url: "https://developer-hub.{hub_domain}/"
  token_param: "access_token"

screenshots:
