# Re-run htpasswd generation and OAuth patch (e.g. after renaming IdP to workshop-users).
# Prerequisite: platform-users chart synced (platform-users-setup ServiceAccount + RBAC).
---
apiVersion: batch/v1
kind: Job
metadata:
  name: htpasswd-users-secret-fix
  namespace: openshift-gitops
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: platform-users-setup
      restartPolicy: Never
      volumes:
        - name: htpasswd-data
          emptyDir: {}
      initContainers:
        - name: generate-htpasswd
          image: registry.access.redhat.com/ubi9/httpd-24:latest
          env:
            - name: USER_COUNT
              value: "50"
            - name: DEFAULT_PASSWORD
              value: "Welcome123!"
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              HTPASS_FILE=/data/htpasswd
              rm -f "$HTPASS_FILE"
              htpasswd -c -B -b "$HTPASS_FILE" platformadmin "$DEFAULT_PASSWORD"
              htpasswd -B -b "$HTPASS_FILE" admin "$DEFAULT_PASSWORD"
              for i in $(seq 1 "$USER_COUNT"); do
                htpasswd -B -b "$HTPASS_FILE" "user${i}" "$DEFAULT_PASSWORD"
              done
              wc -l "$HTPASS_FILE"
          volumeMounts:
            - name: htpasswd-data
              mountPath: /data
      containers:
        - name: setup
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: HTPASSWD_SECRET
              value: workshop-users
            - name: IDP_NAME
              value: workshop-users
          volumeMounts:
            - name: htpasswd-data
              mountPath: /data
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              oc create secret generic "$HTPASSWD_SECRET" \
                --from-file=htpasswd=/data/htpasswd \
                -n openshift-config \
                --dry-run=client -o yaml | oc apply -f -

              PROVIDERS_JSON=$(oc get oauth cluster -o jsonpath='{.spec.identityProviders}' 2>/dev/null || echo "[]")
              if [ "$PROVIDERS_JSON" = "null" ] || [ -z "$PROVIDERS_JSON" ]; then
                PROVIDERS_JSON="[]"
              fi

              PATCH=$(PROVIDERS_JSON="$PROVIDERS_JSON" IDP_NAME="$IDP_NAME" HTPASSWD_SECRET="$HTPASSWD_SECRET" python3 -c "
              import json, os
              providers = json.loads(os.environ.get('PROVIDERS_JSON') or '[]')
              if providers is None:
                  providers = []
              name = os.environ['IDP_NAME']
              secret = os.environ['HTPASSWD_SECRET']
              filtered = [p for p in providers if p.get('name') not in (name, 'htpasswd_users')]
              filtered.append({
                  'name': name,
                  'mappingMethod': 'claim',
                  'type': 'HTPasswd',
                  'htpasswd': {'fileData': {'name': secret}},
              })
              print(json.dumps({'spec': {'identityProviders': filtered}}))
              ")

              oc patch oauth cluster --type merge -p "$PATCH"
              echo "OAuth patched with HTPasswd provider ${IDP_NAME}"
