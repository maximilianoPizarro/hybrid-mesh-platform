apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}-cnv
  title: KubeVirt VM — ${{ values.name }}
  description: Workshop cirros VM in namespace ${{ values.name }} (memory ${{ values.memory }}, cpu ${{ values.cpu }})
  annotations:
    backstage.io/kubernetes-id: ${{ values.name }}
    backstage.io/kubernetes-namespace: ${{ values.name }}
    backstage.io/kubernetes-cluster: hub
    backstage.io/techdocs-ref: dir:.
    gitlab.com/project-slug: ws-${{ values.owner }}/${{ values.name }}-cnv
    quay.io/repository-slug: workshop/${{ values.owner }}-${{ values.name }}-cnv
  links:
    - url: https://console-openshift-console.${{ values.clusterDomain }}/k8s/ns/${{ values.name }}/kubevirt.io~v1~VirtualMachine
      title: Virtual Machines (console)
      icon: web
    - url: https://console-openshift-console.${{ values.clusterDomain }}/k8s/ns/openshift-cnv/operators.coreos.com~v1alpha1~ClusterServiceVersion
      title: OpenShift Virtualization operator
      icon: catalog
spec:
  type: virtual-machine
  lifecycle: experimental
  owner: ${{ values.owner }}
  system: cnv-workshop
  dependsOn:
    - resource:minio-storage
