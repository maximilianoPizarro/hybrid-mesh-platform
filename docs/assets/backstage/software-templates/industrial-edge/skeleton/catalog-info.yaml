apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.uniqueName }}
  title: Industrial Edge ${{ values.name }} (${{ values.targetCluster }} / ${{ values.environment }})
  description: IoT edge instance on spoke ${{ values.targetCluster }}
  annotations:
    backstage.io/kubernetes-id: ${{ values.uniqueName }}
    backstage.io/kubernetes-namespace: ${{ values.namespace }}
    backstage.io/kubernetes-cluster: ${{ values.targetCluster }}
    backstage.io/techdocs-ref: dir:.
    janus-idp.io/tekton: ${{ values.namespace }}
    gitlab.com/project-slug: ws-${{ values.owner }}/${{ values.name }}-${{ values.targetCluster }}-${{ values.environment }}
    backstage.io/source-location: url:https://gitlab.apps.${{ values.clusterDomain }}/ws-${{ values.owner }}/${{ values.name }}-${{ values.targetCluster }}-${{ values.environment }}
    kairos.io/environment: ${{ values.environment }}
    quay.io/repository-slug: workshop/${{ values.uniqueName }}
    kuadrant.io/api-product: ${{ values.uniqueName }}
  links:
    - url: https://gitlab.apps.${{ values.clusterDomain }}/ws-${{ values.owner }}/${{ values.name }}-${{ values.targetCluster }}-${{ values.environment }}
      title: Source Code (Gitea)
      icon: code
    - url: https://gitlab.apps.${{ values.clusterDomain }}/ws-${{ values.owner }}/${{ values.name }}-${{ values.targetCluster }}-${{ values.environment }}/raw/branch/main/README.md
      title: Documentation
      icon: docs
    - url: https://devspaces.${{ values.spokeAppsDomain }}/#https://gitlab.apps.${{ values.clusterDomain }}/ws-${{ values.owner }}/${{ values.name }}-${{ values.targetCluster }}-${{ values.environment }}
      title: Open in DevSpaces
      icon: chat
  tags:
    - industrial-edge
    - iot
    - ${{ values.targetCluster }}
spec:
  type: service
  lifecycle: experimental
  owner: ${{ values.owner }}
  system: industrial-edge
  dependsOn:
    - component:machine-sensors-${{ values.targetCluster }}
    - component:kafka-dev-cluster-${{ values.targetCluster }}
    - resource:minio-storage
  consumesApis:
    - mqtt-sensor-api
    - kafka-iot-topics-api
