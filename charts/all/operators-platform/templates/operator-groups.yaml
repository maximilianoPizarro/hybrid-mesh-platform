{{- /*
  OperatorGroups for redhat-ods-operator and openshift-cluster-observability-operator
  are created by clustergroup (targetNamespaces: [] in hub values.yaml).
*/ -}}
{{- if eq .Values.clusterRole "hub" }}
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-serverless
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-serverless
  namespace: openshift-serverless
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec: {}
---
{{- end }}
{{- /*
  openshift-cluster-observability-operator OG: clustergroup (hub values targetNamespaces: []).
*/ -}}
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-tempo-operator
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-tempo-operator
  namespace: openshift-tempo-operator
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec: {}
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-cnv
  namespace: openshift-cnv
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  targetNamespaces:
    - openshift-cnv
