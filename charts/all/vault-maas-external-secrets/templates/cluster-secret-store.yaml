{{- if include "vault-maas-external-secrets.enabled" . }}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.externalSecrets.storeName }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  provider:
    vault:
      server: {{ .Values.vault.server | quote }}
      path: {{ .Values.vault.kvMount | quote }}
      version: {{ .Values.vault.kvVersion | quote }}
      {{- with .Values.vault.caSecret }}
      {{- if .enabled }}
      caProvider:
        type: Secret
        namespace: {{ $.Values.vault.namespace }}
        name: {{ .name }}
        key: {{ .key }}
      {{- end }}
      {{- end }}
      auth:
        kubernetes:
          mountPath: {{ .Values.vault.kubernetesAuthMount | quote }}
          role: {{ .Values.vault.role | quote }}
          serviceAccountRef:
            name: {{ .Values.externalSecrets.serviceAccountName }}
            namespace: {{ .Values.externalSecrets.namespace }}
{{- end }}
