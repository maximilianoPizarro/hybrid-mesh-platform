{{- if include "vault-maas-external-secrets.enabled" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.externalSecrets.serviceAccountName }}
  namespace: {{ .Values.externalSecrets.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth-delegator
  namespace: {{ .Values.externalSecrets.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-maas-auth-delegator
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault-auth-delegator
    namespace: {{ .Values.externalSecrets.namespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-maas-k8s-auth
  namespace: {{ .Values.vault.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-maas-k8s-auth
  namespace: {{ .Values.vault.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["maas-facilitator-seed"]
    verbs: ["get", "create", "patch", "update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["maas-facilitator-rhdp-sync-script"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-maas-k8s-auth
  namespace: {{ .Values.vault.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-maas-k8s-auth
subjects:
  - kind: ServiceAccount
    name: vault-maas-k8s-auth
    namespace: {{ .Values.vault.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-maas-k8s-auth-read-keys
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vaultkeys"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-maas-k8s-auth-read-keys
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-maas-k8s-auth-read-keys
subjects:
  - kind: ServiceAccount
    name: vault-maas-k8s-auth
    namespace: {{ .Values.vault.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-maas-k8s-auth-field-content
  namespace: {{ .Values.rhdpSeedSync.argocdNamespace | default "openshift-gitops" }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    resourceNames: ["{{ .Values.rhdpSeedSync.fieldContentApp | default "field-content" }}"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-maas-k8s-auth-field-content
  namespace: {{ .Values.rhdpSeedSync.argocdNamespace | default "openshift-gitops" }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-maas-k8s-auth-field-content
subjects:
  - kind: ServiceAccount
    name: vault-maas-k8s-auth
    namespace: {{ .Values.vault.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-maas-k8s-auth-eso-token
  namespace: {{ .Values.externalSecrets.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: ["{{ .Values.externalSecrets.serviceAccountName }}", "vault-auth-delegator"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-maas-k8s-auth-eso-token
  namespace: {{ .Values.externalSecrets.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-maas-k8s-auth-eso-token
subjects:
  - kind: ServiceAccount
    name: vault-maas-k8s-auth
    namespace: {{ .Values.vault.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-maas-k8s-auth-eso-read
  namespace: {{ .Values.externalSecrets.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["kube-root-ca.crt"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-maas-k8s-auth-eso-read
  namespace: {{ .Values.externalSecrets.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-maas-k8s-auth-eso-read
subjects:
  - kind: ServiceAccount
    name: vault-maas-k8s-auth
    namespace: {{ .Values.vault.namespace }}
{{- end }}
