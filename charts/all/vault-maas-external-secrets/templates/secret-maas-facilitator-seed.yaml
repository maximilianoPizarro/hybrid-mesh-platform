{{- if and (include "vault-maas-external-secrets.enabled" .) (include "vault-maas-external-secrets.litemaasApiKey" .) }}
{{- $key := include "vault-maas-external-secrets.litemaasApiKey" . -}}
{{- $model := .Values.litemaas.model | default "" -}}
{{- $base := include "vault-maas-external-secrets.maasApiBase" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: maas-facilitator-seed
  namespace: {{ .Values.vault.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    hybrid-mesh.redhat.com/maas-seed-source: clustergroup-litemaas
type: Opaque
stringData:
  api-key: {{ $key | quote }}
  granite-api-key: {{ .Values.litemaas.graniteApiKey | default $key | quote }}
  deepseek-api-key: {{ .Values.litemaas.deepseekApiKey | default $key | quote }}
  openai-api-base: {{ $base | quote }}
{{- end }}
