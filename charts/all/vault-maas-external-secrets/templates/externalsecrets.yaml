{{- if include "vault-maas-external-secrets.enabled" . }}
{{- $store := .Values.externalSecrets.storeName -}}
{{- $refresh := .Values.externalSecrets.refreshInterval -}}
{{- $maasPath := .Values.vault.maasPath -}}
{{- $base := .Values.maas.openAiApiBase -}}
{{- if .Values.consumers.aiGateway.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-maas-upstream-credentials
  namespace: {{ .Values.consumers.aiGateway.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  refreshInterval: {{ $refresh | quote }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $store }}
  target:
    name: {{ .Values.consumers.aiGateway.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: {{ $maasPath | quote }}
        property: api-key
{{- end }}
{{- if .Values.consumers.kairos.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kairos-ai-credentials
  namespace: {{ .Values.consumers.kairos.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  refreshInterval: {{ $refresh | quote }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $store }}
  target:
    name: {{ .Values.consumers.kairos.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: {{ $maasPath | quote }}
        property: api-key
{{- end }}
{{- if .Values.consumers.maasWorkshop.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openshift-ai-maas-credentials
  namespace: {{ .Values.consumers.maasWorkshop.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  refreshInterval: {{ $refresh | quote }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $store }}
  target:
    name: {{ .Values.consumers.maasWorkshop.secretName }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        api-key: "{{ `{{ .apikey }}` }}"
        OPENAI_API_BASE: {{ $base | quote }}
  data:
    - secretKey: apikey
      remoteRef:
        key: {{ $maasPath | quote }}
        property: api-key
{{- end }}
{{- if .Values.consumers.neuroface.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: neuroface-maas-api-key
  namespace: {{ .Values.consumers.neuroface.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  refreshInterval: {{ $refresh | quote }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $store }}
  target:
    name: {{ .Values.consumers.neuroface.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: {{ $maasPath | quote }}
        property: api-key
{{- end }}
{{- if .Values.consumers.developerHubLightspeed.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llama-stack-vllm-api-key
  namespace: {{ .Values.consumers.developerHubLightspeed.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  refreshInterval: {{ $refresh | quote }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $store }}
  target:
    name: {{ .Values.consumers.developerHubLightspeed.secretName }}
    creationPolicy: Merge
  data:
    - secretKey: {{ .Values.consumers.developerHubLightspeed.mergeKey }}
      remoteRef:
        key: {{ $maasPath | quote }}
        property: api-key
{{- end }}
{{- end }}
