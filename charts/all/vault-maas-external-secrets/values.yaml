clusterDomain: ""
enabled: true

vault:
  namespace: vault
  pod: vault-0
  server: https://vault.vault.svc.cluster.local:8200
  kvVersion: v2
  kvMount: secret
  maasPath: workshop/maas
  kubernetesAuthMount: kubernetes
  role: external-secrets-maas
  k8sAuth:
    reviewerTokenDuration: 24h
    refreshCron:
      enabled: true
      schedule: "*/15 * * * *"
  caSecret:
    enabled: true
    name: vault-secret
    key: tls.crt

externalSecrets:
  namespace: external-secrets
  serviceAccountName: external-secrets-vault
  refreshInterval: 1h
  storeName: vault-workshop-maas

maas:
  openAiApiBase: https://maas-rhdp.apps.maas.redhatworkshops.io/v1
  # Vault secret/workshop/maas keys (seeded from maas-facilitator-seed):
  #   api-key            → llama-scout-17b
  #   granite-api-key    → granite-3-2-8b-instruct
  #   deepseek-api-key   → deepseek-r1-distill-qwen-14b
  #   openai-api-base    → MaaS endpoint (set by seed job)

consumers:
  aiGateway:
    enabled: true
    namespace: ai-gateway-system
    secretName: ai-maas-upstream-credentials
    vaultProperty: granite-api-key
  kairos:
    enabled: true
    namespace: kairos-system
    secretName: kairos-ai-credentials
    vaultProperty: api-key
  maasWorkshop:
    enabled: true
    namespace: maas-workshop
    secretName: openshift-ai-maas-credentials
  neuroface:
    enabled: true
    namespace: neuroface
    secretName: neuroface-maas-api-key
    vaultProperty: api-key
  developerHubLightspeed:
    enabled: true
    namespace: developer-hub
    secretName: llama-stack-secrets
    mergeKey: VLLM_API_KEY
    vaultProperty: granite-api-key

authPolicySync:
  enabled: true
  namespace: ai-gateway-system
  authPolicyName: ai-maas-auth
  secretName: ai-maas-upstream-credentials
  schedule: "*/10 * * * *"
  image: registry.redhat.io/openshift4/ose-cli:latest

rolloutSync:
  enabled: true
  schedule: "*/15 * * * *"
  image: registry.redhat.io/openshift4/ose-cli:latest
  deployments:
    - namespace: neuroface
      name: neuroface-backend
    - namespace: developer-hub
      name: backstage-developer-hub
    - namespace: kairos-system
      name: kairos-controller-manager
