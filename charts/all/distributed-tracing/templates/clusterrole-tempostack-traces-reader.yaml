apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tempostack-traces-reader
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups:
      - tempo.grafana.com
    resources:
      - {{ .Values.tempo.tenantName }}
    resourceNames:
      - traces
    verbs:
      - get
