{{- if eq (.Values.gateway.mode | default "proxy") "proxy" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: hub-gateway-proxy-config
  namespace: hub-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  default.conf: |
    upstream ie_front {
    {{- if and .Values.clusters.east.domain .Values.clusters.west.domain }}
      server industrial-edge-east-front.hub-gateway-system.svc.cluster.local:8080 weight={{ .Values.gateway.weights.east }};
      server industrial-edge-west-front.hub-gateway-system.svc.cluster.local:8080 weight={{ .Values.gateway.weights.west }};
    {{- else if .Values.clusters.east.domain }}
      server industrial-edge-east-front.hub-gateway-system.svc.cluster.local:8080;
    {{- else if .Values.clusters.west.domain }}
      server industrial-edge-west-front.hub-gateway-system.svc.cluster.local:8080;
    {{- else }}
      server 127.0.0.1:65535 down;
    {{- end }}
    }
    upstream ie_api {
    {{- if and .Values.clusters.east.domain .Values.clusters.west.domain }}
      {{- $apiW := .Values.gateway.apiWeights | default dict }}
      {{- $eastW := 100 }}
      {{- $westW := 0 }}
      {{- if hasKey $apiW "east" }}{{- $eastW = $apiW.east }}{{- end }}
      {{- if hasKey $apiW "west" }}{{- $westW = $apiW.west }}{{- end }}
      {{- if gt (int $eastW) 0 }}
      server industrial-edge-east-api.hub-gateway-system.svc.cluster.local:8080 weight={{ $eastW }};
      {{- end }}
      {{- if gt (int $westW) 0 }}
      server industrial-edge-west-api.hub-gateway-system.svc.cluster.local:8080 weight={{ $westW }};
      {{- end }}
    {{- else if .Values.clusters.east.domain }}
      server industrial-edge-east-api.hub-gateway-system.svc.cluster.local:8080;
    {{- else if .Values.clusters.west.domain }}
      server industrial-edge-west-api.hub-gateway-system.svc.cluster.local:8080;
    {{- else }}
      server 127.0.0.1:65535 down;
    {{- end }}
    }
    server {
      listen 8080;
      location /api {
        proxy_pass http://ie_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
      }
      location / {
        proxy_pass http://ie_front;
        proxy_set_header Host $host;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub-gateway-istio
  namespace: hub-gateway-system
  labels:
    app: hub-gateway-istio
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hub-gateway-istio
  template:
    metadata:
      labels:
        app: hub-gateway-istio
    spec:
      containers:
        - name: nginx
          image: {{ .Values.gateway.proxy.image | default "mirror.gcr.io/nginxinc/nginx-unprivileged:1.27.3-alpine" | quote }}
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: hub-gateway-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: hub-gateway-istio
  namespace: hub-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app: hub-gateway-istio
  ports:
    - name: http
      port: 8080
      targetPort: 8080
{{- end }}
