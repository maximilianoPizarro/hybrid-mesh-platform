{{- if .Values.bootstrap.platformContent.enabled }}
{{- $api := include "gitlab-operator.apiUrl" . -}}
{{- $web := include "gitlab-operator.webUrl" . -}}
{{- $g := .Values.global | default dict -}}
{{- $repoUrl := .Values.bootstrap.platformContent.repoUrl | default $g.repoURL | default "https://github.com/maximilianoPizarro/hybrid-mesh-platform" -}}
{{- $revision := .Values.bootstrap.platformContent.revision | default $g.targetRevision | default "main" -}}
{{- $group := .Values.bootstrap.developerHubGroup -}}
{{- $project := .Values.bootstrap.platformContent.project -}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-platform-content-seed
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded,HookFailed
    argocd.argoproj.io/sync-wave: "6"
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: gitlab-workshop-bootstrap
      initContainers:
        - name: gitlab-pat
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: GITLAB_NS
              value: {{ .Values.namespace | quote }}
            - name: GITLAB_API
              value: {{ $api | quote }}
            - name: DEVHUB_GROUP
              value: {{ $group | quote }}
            - name: PROJECT_NAME
              value: {{ $project | quote }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              echo "Waiting for gitlab-toolbox..."
              for attempt in $(seq 1 90); do
                if oc get deploy gitlab-toolbox -n "${GITLAB_NS}" -o jsonpath='{.status.readyReplicas}' 2>/dev/null | grep -q '^1$'; then
                  break
                fi
                sleep 10
              done
              oc get deploy gitlab-toolbox -n "${GITLAB_NS}" -o jsonpath='{.status.readyReplicas}' | grep -q '^1$' \
                || { echo "gitlab-toolbox not ready" >&2; exit 1; }
              RAILS_OUT=$(oc exec -n "${GITLAB_NS}" deploy/gitlab-toolbox -c toolbox -- gitlab-rails runner "
                root = User.find_by(username: 'root') || User.admins.first
                pat_name = 'platform-content-seed'
                root.personal_access_tokens.where(name: pat_name).find_each(&:revoke!)
                pat = root.personal_access_tokens.create!(
                  name: pat_name,
                  scopes: [:api, :read_repository, :write_repository],
                  expires_at: 1.year.from_now
                )
                puts pat.token
              ")
              echo "${RAILS_OUT}" | tail -1 | tr -d '\r' > /shared/gitlab-pat
              chmod 600 /shared/gitlab-pat
              GITLAB_PAT=$(cat /shared/gitlab-pat)

              GROUP_JSON=$(curl -skS "${GITLAB_API}/groups/${DEVHUB_GROUP}" \
                -H "PRIVATE-TOKEN: ${GITLAB_PAT}" || echo '{}')
              GROUP_ID=$(echo "${GROUP_JSON}" | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*\([0-9][0-9]*\).*/\1/p' | head -1)
              if [ -z "${GROUP_ID}" ]; then
                echo "ERROR: group ${DEVHUB_GROUP} not found — run gitlab-workshop-bootstrap first" >&2
                exit 1
              fi

              PROJECT_PATH="${DEVHUB_GROUP}/${PROJECT_NAME}"
              HTTP=$(curl -skS -o /dev/null -w "%{http_code}" \
                -H "PRIVATE-TOKEN: ${GITLAB_PAT}" \
                "${GITLAB_API}/projects/${PROJECT_PATH//\//%2F}")
              if [ "${HTTP}" = "404" ]; then
                echo "Creating project ${PROJECT_PATH}..."
                CREATE=$(curl -skS -X POST "${GITLAB_API}/projects" \
                  -H "PRIVATE-TOKEN: ${GITLAB_PAT}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"${PROJECT_NAME}\",\"path\":\"${PROJECT_NAME}\",\"namespace_id\":${GROUP_ID},\"visibility\":\"public\",\"initialize_with_readme\":false}")
                echo "${CREATE}" | grep -q '"id"' || { echo "Project create failed: ${CREATE}" >&2; exit 1; }
              fi
          volumeMounts:
            - name: shared
              mountPath: /shared
      containers:
        - name: seed
          image: registry.redhat.io/ubi9/git-947:latest
          env:
            - name: GITLAB_WEB
              value: {{ $web | quote }}
            - name: DEVHUB_GROUP
              value: {{ $group | quote }}
            - name: PROJECT_NAME
              value: {{ $project | quote }}
            - name: PATTERN_REPO_URL
              value: {{ $repoUrl | quote }}
            - name: PATTERN_REVISION
              value: {{ $revision | quote }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              GITLAB_PAT=$(cat /shared/gitlab-pat)
              PROJECT_PATH="${DEVHUB_GROUP}/${PROJECT_NAME}"

              WORK=/tmp/platform-content-seed
              rm -rf "${WORK}"
              mkdir -p "${WORK}/src" "${WORK}/repo"
              git clone --depth 1 --branch "${PATTERN_REVISION}" "${PATTERN_REPO_URL}" "${WORK}/src/pattern"
              ROOT_DIR="${WORK}/src/pattern"

              cp -a "${ROOT_DIR}/docs/assets/backstage/software-templates" "${WORK}/repo/"
              mkdir -p "${WORK}/repo/docs"
              cp -a "${ROOT_DIR}/charts/all/developer-hub/files/onboarding" "${WORK}/repo/docs/"
              cp -a "${ROOT_DIR}/charts/all/developer-hub/files/techdocs/industrial-edge" "${WORK}/repo/docs/industrial-edge"
              printf '%s\n' "# Platform content" "" "Seeded from ${PATTERN_REPO_URL} @ ${PATTERN_REVISION}." > "${WORK}/repo/README.md"

              cd "${WORK}/repo"
              git init -b main
              git config user.email "platform-content@developer-hub.local"
              git config user.name "platform-content-seed"
              git add .
              git commit -m "Seed platform content from pattern ${PATTERN_REVISION}"

              REMOTE="https://oauth2:${GITLAB_PAT}@${GITLAB_WEB#https://}/${PROJECT_PATH}.git"
              git remote add origin "${REMOTE}"
              git push -u origin main --force
              echo "gitlab-platform-content-seed complete: ${GITLAB_WEB}/${PROJECT_PATH}"
          volumeMounts:
            - name: shared
              mountPath: /shared
      volumes:
        - name: shared
          emptyDir: {}
{{- end }}
