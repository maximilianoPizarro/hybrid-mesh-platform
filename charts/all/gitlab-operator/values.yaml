clusterDomain: ""
# Workshop scale (profiles: 30, 50, 100). Hub overrides via charts/region/hub/values.yaml.
userCount: 30
namespace: gitlab
runnerNamespace: gitlab-runner

operator:
  packageName: gitlab-operator-kubernetes
  channel: stable
  source: community-operators
  installPlanApproval: Automatic

runnerOperator:
  packageName: gitlab-runner-operator
  channel: stable
  source: community-operators
  installPlanApproval: Automatic

gitlab:
  chartVersion: "9.11.6"
  rootPasswordSecret: gitlab-gitlab-initial-root-password
  postgresStorage: 50Gi
  gitalyStorage: 50Gi
  registryEnabled: true
  # Sizing for ~30 concurrent scaffolder users (HTTP + Sidekiq background jobs).
  webservice:
    minReplicas: 3
    maxReplicas: 4
    workerProcesses: 4
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        memory: 4Gi
  sidekiq:
    minReplicas: 2
    maxReplicas: 3
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        memory: 4Gi
  gitlabShell:
    minReplicas: 2
    maxReplicas: 2

bootstrap:
  groupPrefix: ws-
  developerHubGroup: developer-hub
  appOfAppsGroup: app-of-apps
  workshopDemosGroup: workshop-demos
  platformContent:
    enabled: true
    project: platform-content
    repoUrl: ""
    revision: ""
    schedule: "*/30 * * * *"
    cloneImage: quay.io/rhpds/git-cloner:v1.1.2
