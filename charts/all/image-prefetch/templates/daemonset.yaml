{{- if .Values.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: image-prefetch
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: image-prefetch
    app.kubernetes.io/part-of: hybrid-mesh-platform
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: image-prefetch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: image-prefetch
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- range $idx, $img := .Values.images }}
        - name: pull-{{ $idx }}
          image: {{ $img }}
          command: ["true"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
        {{- end }}
      containers:
        - name: pause
          image: registry.access.redhat.com/ubi9/pause:latest
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 10m
              memory: 16Mi
{{- end }}
