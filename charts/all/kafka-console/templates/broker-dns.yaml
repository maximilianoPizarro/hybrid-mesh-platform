{{- /*
  ExternalName Services on the hub that resolve Kafka bootstrap service FQDNs
  to Skupper listener services in service-interconnect.

  Kafka brokers advertise their bootstrap FQDN as advertisedHost. When the
  Console (on the hub) receives this in metadata, it needs to resolve it.
  ExternalName CNAMEs the spoke-internal bootstrap name to the Skupper service,
  which tunnels to the real broker. No IP lookup at sync time needed.
*/ -}}
apiVersion: v1
kind: Namespace
metadata:
  name: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: industrial-edge-stormshift-messaging
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: industrial-edge-data-lake
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Service
metadata:
  name: dev-cluster-kafka-bootstrap
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: kafka-east-tst.service-interconnect.svc.cluster.local
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: prod-cluster-kafka-bootstrap
  namespace: industrial-edge-data-lake
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: kafka-east-datalake.service-interconnect.svc.cluster.local
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: factory-cluster-kafka-bootstrap
  namespace: industrial-edge-stormshift-messaging
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: kafka-east-stormshift.service-interconnect.svc.cluster.local
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
