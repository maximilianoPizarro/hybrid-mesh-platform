{{- /*
  ExternalName Services on the hub that resolve region-specific Kafka bootstrap
  FQDNs to Skupper listener services in service-interconnect.

  East and west spokes advertise distinct bootstrap hostnames (suffix -east/-west)
  so the hub can route metadata reconnects to the correct Skupper tunnel.
*/ -}}
apiVersion: v1
kind: Namespace
metadata:
  name: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: industrial-edge-stormshift-messaging
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: industrial-edge-data-lake
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Service
metadata:
  name: dev-cluster-kafka-bootstrap-east
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: kafka-east-tst.service-interconnect.svc.cluster.local
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: dev-cluster-kafka-bootstrap-west
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: kafka-west-tst.service-interconnect.svc.cluster.local
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: prod-cluster-kafka-bootstrap-east
  namespace: industrial-edge-data-lake
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: kafka-east-datalake.service-interconnect.svc.cluster.local
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: prod-cluster-kafka-bootstrap-west
  namespace: industrial-edge-data-lake
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: kafka-west-datalake.service-interconnect.svc.cluster.local
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: factory-cluster-kafka-bootstrap-east
  namespace: industrial-edge-stormshift-messaging
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: kafka-east-stormshift.service-interconnect.svc.cluster.local
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: factory-cluster-kafka-bootstrap-west
  namespace: industrial-edge-stormshift-messaging
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: kafka-west-stormshift.service-interconnect.svc.cluster.local
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
