{{- $count := int .Values.userCount }}
{{- $namespaces := list
  "industrial-edge-tst-all"
  "industrial-edge-data-lake"
  "industrial-edge-stormshift-messaging"
  "industrial-edge-ml-workspace"
  "hub-gateway-system"
  "workshop-kuadrant-apis"
  "ai-gateway-system"
  "neuroface"
  "developer-hub"
  "maas-workshop"
  "mailpit-templates"
  "mcp-system"
  "showroom"
  "redhat-ods-applications"
  "openshift-gitops"
  "service-interconnect"
  "openshift-cnv"
  "cnv-workshop"
  "camel-dashboard"
  "kafka-console"
  "stackrox"
  "gitlab"
  "kubecost"
  "kairos-system"
  "quay-registry"
  "openshift-cluster-observability-operator"
  "vault"
  "redhat-connectivity-link-operator"
  "spoke-gateway-system"
}}
{{- range $ns := $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workshop-users-view
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
{{- range $i := until $count }}
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: {{ printf "user%d" (add $i 1) | quote }}
{{- end }}
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: admin
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: platformadmin
{{- end }}
