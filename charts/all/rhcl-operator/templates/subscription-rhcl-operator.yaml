apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhcl-operator
  namespace: redhat-connectivity-link-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  channel: stable
  installPlanApproval: Automatic
  name: rhcl-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  # Sail/Istio GatewayClass uses istio.io/gateway-controller; RHCL CSV default is openshift only.
  config:
    env:
      - name: ISTIO_GATEWAY_CONTROLLER_NAMES
        value: {{ .Values.kuadrant.istioGatewayControllerNames | default "istio.io/gateway-controller,openshift.io/gateway-controller/v1" | quote }}
