{{- /*
  Region-specific advertised bootstrap hostname resolves to the Strimzi bootstrap
  service on the spoke so local producers/consumers can follow broker metadata.
*/ -}}
{{- $cn := include "industrial-edge-stormshift.clusterName" . -}}
apiVersion: v1
kind: Service
metadata:
  name: factory-cluster-kafka-bootstrap-{{ $cn }}
  namespace: industrial-edge-stormshift-messaging
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: factory-cluster-kafka-bootstrap.industrial-edge-stormshift-messaging.svc.cluster.local
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
