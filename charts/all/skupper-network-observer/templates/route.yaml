{{- $domain := .Values.global.localClusterDomain | default .Values.clusterDomain | default "apps.cluster.example.com" -}}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: skupper-network-observer
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  host: skupper-network-observer-service-interconnect.{{ $domain }}
  to:
    kind: Service
    name: skupper-network-observer
  port:
    targetPort: https
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect
