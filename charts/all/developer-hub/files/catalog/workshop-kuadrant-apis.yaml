apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: workshop-kuadrant-apis
  title: Workshop Kuadrant API Products
  description: Dedicated workshop-apis + ai-gateway with ExternalName backends, Kuadrant API keys, Vault paths
  tags:
    - workshop
    - kuadrant
    - gateway-api
    - external-api
spec:
  owner: platform-engineering
  domain: hub-platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: workshop-apis-gateway
  title: Workshop APIs Gateway
  description: Dedicated Gateway API for httpbin, REST Countries, and MCP (ExternalName backends)
  annotations:
    backstage.io/kubernetes-namespace: workshop-kuadrant-apis
    backstage.io/kubernetes-cluster: hub
    backstage.io/kubernetes-id: workshop-apis-gateway
    argocd/app-name: field-content-workshop-kuadrant-apis
  links:
    - url: https://workshop-apis.__HUB_APPS_DOMAIN__/httpbin/get
      title: Gateway (401 without API key)
      icon: web
    - url: https://developer-hub.__HUB_APPS_DOMAIN__/kuadrant
      title: Kuadrant — API Products & keys
      icon: catalog
    - url: https://vault.__HUB_APPS_DOMAIN__/ui/
      title: Vault — optional key storage
      icon: lock
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: workshop-kuadrant-apis
  domain: hub-platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ai-gateway-maas
  title: AI Gateway — MaaS LLM
  description: Dedicated ai-gateway with ExternalName to MaaS RHDP, TokenRateLimitPolicy, upstream key from Vault/litemaas
  annotations:
    backstage.io/kubernetes-namespace: ai-gateway-system
    backstage.io/kubernetes-cluster: hub
    backstage.io/kubernetes-id: ai-gateway
    argocd/app-name: field-content-workshop-kuadrant-apis
    kuadrant.io/api-product: workshop-llm-tokens
  links:
    - url: https://ai-gateway.__HUB_APPS_DOMAIN__/v1/chat/completions
      title: MaaS chat completions (API key)
      icon: api
    - url: https://developer-hub.__HUB_APPS_DOMAIN__/kuadrant
      title: Request API key
      icon: catalog
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: workshop-kuadrant-apis
  domain: hub-platform
  providesApis:
    - workshop-maas-openapi
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: workshop-httpbin-api
  title: httpbin API Product (ExternalName)
  description: External httpbin.org via workshop-apis gateway + PlanPolicy
  annotations:
    backstage.io/kubernetes-namespace: workshop-kuadrant-apis
    backstage.io/kubernetes-id: workshop-ext-httpbin
    kuadrant.io/api-product: workshop-httpbin
  links:
    - url: https://workshop-apis.__HUB_APPS_DOMAIN__/httpbin/get
      title: Try httpbin
      icon: web
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: workshop-kuadrant-apis
  providesApis:
    - workshop-httpbin-openapi
  dependsOn:
    - component:workshop-apis-gateway
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: workshop-mcp-api
  title: MCP Gateway API Product
  description: Kuadrant MCP Gateway (ArgoCD + k8s tools) via workshop-apis with API key
  annotations:
    backstage.io/kubernetes-namespace: workshop-kuadrant-apis
    backstage.io/kubernetes-id: workshop-ext-mcp
    kuadrant.io/api-product: workshop-mcp-gateway
  links:
    - url: https://workshop-apis.__HUB_APPS_DOMAIN__/mcp
      title: MCP endpoint (API key)
      icon: api
    - url: https://mcp-gateway.__HUB_APPS_DOMAIN__/mcp
      title: Direct MCP gateway (no Kuadrant)
      icon: web
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: workshop-kuadrant-apis
  dependsOn:
    - component:workshop-apis-gateway
    - component:workshop-mcp-gateway
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: workshop-restcountries-api
  title: REST Countries API Product
  description: External restcountries.com via workshop-apis
  annotations:
    kuadrant.io/api-product: workshop-restcountries
  links:
    - url: https://workshop-apis.__HUB_APPS_DOMAIN__/countries/name/chile
      title: Try REST Countries
      icon: web
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: workshop-kuadrant-apis
  providesApis:
    - workshop-restcountries-openapi
  dependsOn:
    - component:workshop-apis-gateway
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: workshop-httpbin-openapi
  title: httpbin (workshop-apis gateway)
  tags: [kuadrant, external-api, workshop, swagger]
  annotations:
    kuadrant.io/api-product: workshop-httpbin
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: workshop-kuadrant-apis
  definition:
    $text: https://httpbin.org/spec.json
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: workshop-restcountries-openapi
  title: REST Countries (workshop-apis gateway)
  tags: [kuadrant, external-api, workshop, swagger]
  annotations:
    kuadrant.io/api-product: workshop-restcountries
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: workshop-kuadrant-apis
  definition:
    openapi: 3.0.3
    info:
      title: REST Countries (via workshop-apis)
      version: v1
    servers:
      - url: https://workshop-apis.__HUB_APPS_DOMAIN__/countries
    paths:
      /name/{country}:
        get:
          summary: Country by name
          parameters:
            - name: country
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: OK
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: workshop-maas-openapi
  title: MaaS LLM (ai-gateway)
  tags: [kuadrant, llm, maas, ai-gateway, swagger]
  annotations:
    kuadrant.io/api-product: workshop-llm-tokens
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: workshop-kuadrant-apis
  definition:
    $text: https://raw.githubusercontent.com/openai/openai-openapi/master/openapi.yaml
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: workshop-mcp-openapi
  title: MCP Gateway (workshop-apis)
  description: Streamable HTTP MCP — use MCP clients; API key via Kuadrant
  tags: [kuadrant, mcp, workshop]
  annotations:
    kuadrant.io/api-product: workshop-mcp-gateway
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: workshop-kuadrant-apis
  definition:
    openapi: 3.0.3
    info:
      title: MCP Gateway proxy
      version: v1
    servers:
      - url: https://workshop-apis.__HUB_APPS_DOMAIN__/mcp
    paths:
      /:
        post:
          summary: MCP JSON-RPC (Streamable HTTP)
          responses:
            "200":
              description: MCP response
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: workshop-api-consumer
  title: Workshop API consumer (userN)
  description: Request Kuadrant API keys in Developer Hub; optional Vault mirror for CI
  tags: [kuadrant, workshop, onboarding, vault]
  links:
    - url: https://developer-hub.__HUB_APPS_DOMAIN__/kuadrant
      title: API Products / Plans / My API Keys
      icon: catalog
    - url: https://developer-hub.__HUB_APPS_DOMAIN__/catalog/default/api/workshop-httpbin-openapi
      title: Swagger — httpbin
      icon: docs
    - url: https://developer-hub.__HUB_APPS_DOMAIN__/catalog/default/api/workshop-maas-openapi
      title: Swagger — MaaS
      icon: docs
    - url: https://vault.__HUB_APPS_DOMAIN__/ui/
      title: Vault UI
      icon: lock
spec:
  type: website
  lifecycle: production
  owner: user1
  system: workshop-kuadrant-apis
  consumesApis:
    - workshop-httpbin-openapi
    - workshop-maas-openapi
    - workshop-mcp-openapi
