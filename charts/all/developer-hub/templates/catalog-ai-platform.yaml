{{- $hub := include "developer-hub.clusterDomain" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-catalog-ai-platform
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  ai-platform.yaml: |
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: hybrid-mesh-ai-platform
      title: Hybrid Mesh AI — Platform AI Services
      description: AI Gateway (Kuadrant + Gateway API), MCP Gateway, NeuroFace vision system, OpenShift AI
      tags: [ai, gateway, mcp, workshop, neuroface]
      links:
        - url: https://developer-hub.{{ $hub }}/catalog/default/system/neuroface
          title: NeuroFace system
          icon: catalog
    spec:
      owner: platform-engineering
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: workshop-ai-gateway
      title: AI Gateway — MaaS via Kuadrant
      description: Gateway API HTTPRoute to external MaaS at /llm with API key auth and token rate limits
      tags: [ai, kuadrant, gateway-api, maas]
      annotations:
        backstage.io/kubernetes-namespace: hub-gateway-system
        backstage.io/kubernetes-cluster: hub
      links:
        - url: https://ai-gateway.{{ $hub }}/v1/chat/completions
          title: MaaS LLM route (API key)
          icon: api
        - url: https://workshop-apis.{{ $hub }}/httpbin/get
          title: Workshop APIs gateway
          icon: web
        - url: https://developer-hub.{{ $hub }}/kuadrant
          title: Kuadrant API keys & plans
          icon: catalog
    spec:
      type: api
      lifecycle: production
      owner: platform-engineering
      system: hybrid-mesh-ai-platform
      dependsOn:
        - component:ai-gateway-maas
        - system:neuroface
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: workshop-mcp-gateway
      title: MCP Gateway (Kuadrant community CRDs)
      description: Federates ArgoCD MCP + k8s MCP tools for Lightspeed and OpenShift AI assistants
      tags: [mcp, kuadrant, gateway-api, lightspeed]
      annotations:
        backstage.io/kubernetes-namespace: mcp-system
        backstage.io/kubernetes-cluster: hub
      links:
        - url: https://mcp-gateway.{{ $hub }}/mcp
          title: MCP Gateway endpoint
          icon: api
        - url: https://developer-hub.{{ $hub }}/lightspeed
          title: Developer Hub Lightspeed
          icon: catalog
    spec:
      type: service
      lifecycle: production
      owner: platform-engineering
      system: hybrid-mesh-ai-platform
