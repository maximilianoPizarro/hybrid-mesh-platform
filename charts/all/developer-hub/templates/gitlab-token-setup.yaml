apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-token-setup
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-token-setup
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["developer-hub-oidc-auth"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["backstage-developer-hub"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-token-setup
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitlab-token-setup
subjects:
  - kind: ServiceAccount
    name: gitlab-token-setup
    namespace: developer-hub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-token-setup-read-root
  namespace: gitlab
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["gitlab-gitlab-initial-root-password"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-token-setup-read-root
  namespace: gitlab
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitlab-token-setup-read-root
subjects:
  - kind: ServiceAccount
    name: gitlab-token-setup
    namespace: developer-hub
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-token-setup
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded,HookFailed
    argocd.argoproj.io/sync-wave: "8"
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: gitlab-token-setup
      containers:
        - name: setup
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: GITLAB_API
              value: "https://gitlab.apps.{{ include "developer-hub.clusterDomain" . }}/api/v4"
            - name: RHDH_NAMESPACE
              value: developer-hub
            - name: RHDH_DEPLOYMENT
              value: backstage-developer-hub
            - name: OIDC_SECRET
              value: developer-hub-oidc-auth
            - name: ROOT_SECRET
              value: gitlab-gitlab-initial-root-password
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              ROOT_PASS=$(oc get secret "${ROOT_SECRET}" -n gitlab -o jsonpath='{.data.password}' | base64 -d)

              echo "Waiting for GitLab API..."
              for attempt in $(seq 1 60); do
                if curl -skf -H "PRIVATE-TOKEN: ${ROOT_PASS}" "${GITLAB_API}/version" >/dev/null 2>&1; then break; fi
                echo "  attempt ${attempt}/60 ..."
                sleep 5
              done
              curl -skf -H "PRIVATE-TOKEN: ${ROOT_PASS}" "${GITLAB_API}/version" || { echo "GitLab not available" >&2; exit 1; }
              echo "GitLab API ready."

              CURRENT=$(oc get secret "${OIDC_SECRET}" -n "${RHDH_NAMESPACE}" \
                -o jsonpath='{.data.GITLAB_TOKEN}' 2>/dev/null | base64 -d 2>/dev/null || true)
              if [ -n "${CURRENT}" ] && [ "${CURRENT}" != "CHANGEME-create-token-in-gitlab-root" ]; then
                HTTP=$(curl -skS -o /dev/null -w "%{http_code}" \
                  -H "PRIVATE-TOKEN: ${CURRENT}" \
                  "${GITLAB_API}/user" || echo "000")
                if [ "${HTTP}" = "200" ]; then
                  echo "GITLAB_TOKEN is valid (HTTP 200) — skipping."
                  exit 0
                fi
                echo "Existing token invalid (HTTP ${HTTP}), creating new token..."
              else
                echo "No valid GITLAB_TOKEN — creating personal access token for root..."
              fi

              EXPIRES=$(date -u -d '+365 days' +%Y-%m-%d 2>/dev/null || date -u -v+365d +%Y-%m-%d)
              RESP=$(curl -skS -X POST "${GITLAB_API}/users/1/personal_access_tokens" \
                -H "PRIVATE-TOKEN: ${ROOT_PASS}" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"developer-hub\",\"scopes\":[\"api\",\"read_user\",\"write_repository\"],\"expires_at\":\"${EXPIRES}\"}")
              NEW_TOKEN=$(echo "${RESP}" | sed -n 's/.*"token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
              if [ -z "${NEW_TOKEN}" ]; then
                echo "Failed to create GitLab token. Response: ${RESP}" >&2
                exit 1
              fi
              echo "Created GitLab PAT for developer-hub."

              oc patch secret "${OIDC_SECRET}" -n "${RHDH_NAMESPACE}" --type merge \
                -p "{\"stringData\":{\"GITLAB_TOKEN\":\"${NEW_TOKEN}\"}}"
              echo "Patched ${OIDC_SECRET} with GITLAB_TOKEN."

              oc rollout restart "deployment/${RHDH_DEPLOYMENT}" -n "${RHDH_NAMESPACE}"
              echo "gitlab-token-setup complete."
