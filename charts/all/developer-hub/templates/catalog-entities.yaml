{{- /*
  Industrial Edge catalog entities — bundled in-chart (no GitHub API).
  Domain placeholders __HUB_APPS_DOMAIN__ / __EAST_APPS_DOMAIN__ / __WEST_APPS_DOMAIN__
  are replaced from RHDP-injected clusterDomain and spoke domains.
*/ -}}
{{- $hub := include "developer-hub.clusterDomain" . -}}
{{- $east := .Values.spokeDomains.east | default "apps.cluster-east.example.com" -}}
{{- $west := .Values.spokeDomains.west | default "apps.cluster-west.example.com" -}}
{{- $ieDocs := "url:https://github.com/maximilianoPizarro/hybrid-mesh-platform/tree/main/charts/all/developer-hub/files/techdocs/industrial-edge" -}}
{{- $githubIeDocs := $ieDocs -}}
{{- $ghPages := .Values.techdocs.githubPagesUrl | default "https://maximilianopizarro.github.io/hybrid-mesh-platform/" -}}
{{- $mqttSpec := .Files.Get "files/catalog/asyncapi/mqtt-sensor.yaml" | replace "__EAST_APPS_DOMAIN__" $east | replace "__WEST_APPS_DOMAIN__" $west -}}
{{- $kafkaSpec := .Files.Get "files/catalog/asyncapi/kafka-iot-topics.yaml" -}}
{{- $s3Spec := .Files.Get "files/catalog/openapi/s3-data-lake.yaml" | replace "__HUB_APPS_DOMAIN__" $hub -}}
{{- $catalog := .Files.Get "files/catalog/industrial-edge-system.yaml" | replace "__HUB_APPS_DOMAIN__" $hub | replace "__EAST_APPS_DOMAIN__" $east | replace "__WEST_APPS_DOMAIN__" $west | replace "__IE_MQTT_SENSOR_ASYNCAPI_SPEC__" $mqttSpec | replace "__IE_KAFKA_IOT_ASYNCAPI_SPEC__" $kafkaSpec | replace "__IE_S3_DATA_LAKE_OPENAPI_SPEC__" $s3Spec | replace "backstage.io/techdocs-ref: dir:./techdocs-line-dashboard" (printf "backstage.io/techdocs-ref: %s" $githubIeDocs) | replace "backstage.io/techdocs-ref: dir:./techdocs" (printf "backstage.io/techdocs-ref: %s" $ieDocs) | replace "url:https://validatedpatterns.io/patterns/hybrid-mesh-platform/" (printf "url:%s" $ghPages) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-catalog-ie
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  industrial-edge-system.yaml: |
{{ $catalog | indent 4 }}
