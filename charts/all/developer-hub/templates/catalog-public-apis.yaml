{{- /*
  Public OpenAPI demo APIs — bundled in-chart for catalog ingestion and Try It Out.
  Published copy also lives under docs/assets/backstage/catalog/ for GitHub Pages.
*/ -}}
{{- $httpbinSpec := .Files.Get "files/catalog/openapi/httpbin-public.yaml" -}}
{{- $restcountriesSpec := .Files.Get "files/catalog/openapi/restcountries-public.yaml" -}}
{{- $jsonplaceholderSpec := .Files.Get "files/catalog/openapi/jsonplaceholder-public.yaml" -}}
{{- $catfactsSpec := .Files.Get "files/catalog/openapi/cat-facts-public.yaml" -}}
{{- $catalog := .Files.Get "files/catalog/public-apis.yaml" | replace "__PUBLIC_HTTPBIN_OPENAPI_SPEC__" $httpbinSpec | replace "__PUBLIC_RESTCOUNTRIES_OPENAPI_SPEC__" $restcountriesSpec | replace "__PUBLIC_JSONPLACEHOLDER_OPENAPI_SPEC__" $jsonplaceholderSpec | replace "__PUBLIC_CATFACTS_OPENAPI_SPEC__" $catfactsSpec -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-catalog-public-apis
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  public-apis.yaml: |
{{ $catalog | indent 4 }}
