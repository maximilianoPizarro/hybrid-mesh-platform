{{- /*
  Workshop onboarding catalog — TechDocs from in-pod mount (mkdocs + docs/ tree preserved).
  Split into two ConfigMaps: root (catalog-info.yaml, mkdocs.yml) and docs (*.md).
  ConfigMap keys cannot contain '/' so docs are in a separate ConfigMap mounted under docs/.
*/ -}}
{{- $onboardingDocs := "dir:/opt/app-root/src/catalog-data/onboarding" -}}
{{- $ghPages := .Values.techdocs.githubPagesUrl | default "https://maximilianopizarro.github.io/hybrid-mesh-platform/" -}}
{{- $platformDocs := printf "%sdocs/onboarding/" $ghPages -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-catalog-onboarding
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
{{- range $path, $_ := .Files.Glob "files/onboarding/*" }}
{{- $rel := trimPrefix "files/onboarding/" $path }}
  {{ $rel }}: |
{{- if eq $rel "catalog-info.yaml" }}
{{ $.Files.Get $path | replace "backstage.io/techdocs-ref: dir:." (printf "backstage.io/techdocs-ref: %s" $onboardingDocs) | replace "https://github.com/maximilianoPizarro/platform-hub-spoke-config/tree/main/docs/assets/backstage/onboarding" $platformDocs | replace "https://maximilianopizarro.github.io/platform-hub-spoke-config/" (printf "https://%s/developer-hub/platform-content" (include "developer-hub.gitlabHost" $)) | indent 4 }}
{{- else }}
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-catalog-onboarding-docs
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
{{- range $path, $_ := .Files.Glob "files/onboarding/docs/*" }}
{{- $rel := trimPrefix "files/onboarding/docs/" $path }}
  {{ $rel }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
