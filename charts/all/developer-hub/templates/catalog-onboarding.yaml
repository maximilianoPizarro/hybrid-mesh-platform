{{- /*
  Workshop onboarding catalog — TechDocs via GitHub repo URL (readTree supported by GithubUrlReader).
  Do NOT use GitHub Pages URLs (FetchUrlReader) or ConfigMap dir:. (flattened keys, no docs/ subdir).
*/ -}}
{{- $ghPages := .Values.techdocs.githubPagesUrl | default "https://maximilianopizarro.github.io/hybrid-mesh-platform/" -}}
{{- $onboardingDocs := "url:https://github.com/maximilianoPizarro/hybrid-mesh-platform/tree/main/charts/all/developer-hub/files/onboarding" -}}
{{- $platformDocs := printf "%sdocs/onboarding/" $ghPages -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-catalog-onboarding
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
{{- range $path, $_ := .Files.Glob "files/onboarding/**" }}
  {{ base $path }}: |
{{- if eq (base $path) "catalog-info.yaml" }}
{{ $.Files.Get $path | replace "backstage.io/techdocs-ref: dir:." (printf "backstage.io/techdocs-ref: %s" $onboardingDocs) | replace "https://github.com/maximilianoPizarro/platform-hub-spoke-config/tree/main/docs/assets/backstage/onboarding" $platformDocs | replace "https://maximilianopizarro.github.io/platform-hub-spoke-config/" (printf "https://%s/developer-hub/platform-content" (include "developer-hub.gitlabHost" $)) | indent 4 }}
{{- else }}
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
