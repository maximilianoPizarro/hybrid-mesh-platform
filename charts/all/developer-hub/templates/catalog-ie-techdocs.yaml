{{- /*
  Industrial Edge TechDocs — flat ConfigMap keys (K8s disallows '/' in key names).
  Not mounted when catalog uses GitHub tree techdocs-ref; kept for optional local fallback.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-catalog-ie-techdocs
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  mkdocs.yml: |
{{ .Files.Get "files/techdocs/industrial-edge/mkdocs.yml" | indent 4 }}
  index.md: |
{{ .Files.Get "files/techdocs/industrial-edge/docs/index.md" | indent 4 }}
  data-flow.md: |
{{ .Files.Get "files/techdocs/industrial-edge/docs/data-flow.md" | indent 4 }}
