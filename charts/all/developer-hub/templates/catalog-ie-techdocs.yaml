{{- /*
  Industrial Edge TechDocs — in-pod mount for local builder (no GitLab token required).
  Preserves docs/ subdirectory structure for mkdocs.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-catalog-ie-techdocs
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
{{- range $path, $_ := .Files.Glob "files/techdocs/industrial-edge/**" }}
{{- $rel := trimPrefix "files/techdocs/industrial-edge/" $path }}
  {{ $rel }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
