apiVersion: v1
kind: Service
metadata:
  name: mailpit-templates
  namespace: mailpit-templates
  labels:
    app: mailpit-templates
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ports:
    - port: 8025
      targetPort: 8025
      protocol: TCP
      name: http
    - port: 1025
      targetPort: 1025
      protocol: TCP
      name: smtp
  selector:
    app: mailpit-templates
