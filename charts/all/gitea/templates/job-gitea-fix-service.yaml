apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-fix-http-service
  namespace: gitea
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: gitea-fix-service
      containers:
        - name: fix
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              oc patch svc gitea-http -n gitea --type=merge -p \
                '{"spec":{"selector":{"app.kubernetes.io/instance":"gitea","app.kubernetes.io/name":"gitea"}}}'
              DOMAIN=$(oc get ingresses.config cluster -o jsonpath='{.spec.domain}')
              HOST="gitea-gitea.${DOMAIN}"
              oc patch route gitea -n gitea --type=merge -p "{\"spec\":{\"host\":\"${HOST}\"}}" 2>/dev/null || true
              echo "gitea-http selector + route host ${HOST} aligned"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-fix-service
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-fix-service
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["gitea-http"]
    verbs: ["get", "patch"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    resourceNames: ["gitea"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gitea-fix-service
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: ["config.openshift.io"]
    resources: ["ingresses"]
    resourceNames: ["cluster"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gitea-fix-service
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gitea-fix-service
subjects:
  - kind: ServiceAccount
    name: gitea-fix-service
    namespace: gitea
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-fix-service
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitea-fix-service
subjects:
  - kind: ServiceAccount
    name: gitea-fix-service
    namespace: gitea
