{{- $pg := .Values.gitea-chart.postgresql-ha.postgresql | default dict -}}
{{- $replicas := $pg.replicaCount | default 1 | int -}}
{{- if .Values.gitea-chart.postgresql-ha.enabled | default true }}
# OpenShift restricted SCC: Bitnami init-chmod-data fails on existing PVC data.
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-postgres-fix-perms
  namespace: gitea
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "2"
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 0
      containers:
        - name: fix
          image: registry.redhat.io/ubi9/ubi-minimal:latest
          command:
            - /bin/sh
            - -ec
            - |
              PG_UID="{{ $pg.openshiftUid | default "1000910000" }}"
              for i in $(seq 0 {{ sub $replicas 1 }}); do
                echo "chown data-gitea-postgresql-ha-postgresql-${i} → ${PG_UID}"
                chown -R "${PG_UID}:${PG_UID}" "/data-${i}" 2>/dev/null || echo "warn: chown /data-${i} partial failure (PVC may not exist yet)"
              done
              echo "done"
          securityContext:
            privileged: true
          volumeMounts:
            {{- range $i := until $replicas }}
            - name: data-{{ $i }}
              mountPath: /data-{{ $i }}
            {{- end }}
      volumes:
        {{- range $i := until $replicas }}
        - name: data-{{ $i }}
          persistentVolumeClaim:
            claimName: data-gitea-postgresql-ha-postgresql-{{ $i }}
            optional: true
        {{- end }}
{{- end }}
