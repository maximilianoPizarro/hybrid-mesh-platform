{{- /* Upstream Gitea PostgreSQL/Valkey set seccomp on containers; anyuid rejects that on OCP 4.17+. */ -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gitea-privileged
  annotations:
    argocd.argoproj.io/sync-wave: "0"
subjects:
  - kind: ServiceAccount
    name: field-content-gitea-chart
    namespace: gitea
  - kind: ServiceAccount
    name: default
    namespace: gitea
  - kind: ServiceAccount
    name: gitea-postgresql-ha
    namespace: gitea
  - kind: ServiceAccount
    name: gitea-valkey-cluster
    namespace: gitea
  - kind: ServiceAccount
    name: gitea-postgresql-ha-pgpool
    namespace: gitea
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
