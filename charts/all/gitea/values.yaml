clusterDomain: ""
# PostSync jobs reach Gitea via this Service (Route also targets gitea-http).
internalHttpService: gitea-http
adminUser: gitea_admin
adminPassword: "openshift"
adminEmail: "admin@gitea.local"
userCount: 50

# External Gitea Helm chart values (subchart via dependency alias gitea-chart)
gitea-chart:
  fullnameOverride: gitea
  ingress:
    enabled: false
    hosts:
      - host: gitea-gitea.apps.cluster.example.com
        paths:
          - path: /
  gitea:
    admin:
      username: gitea_admin
      password: openshift
      passwordMode: keepUpdated
    config:
      server:
        # HTTP behind OpenShift Route (TLS termination at edge); ROOT_URL stays https.
        PROTOCOL: http
  postgresql-ha:
    enabled: true
    volumePermissions:
      enabled: true
      containerSecurityContext:
        runAsUser: 0
        privileged: true
    postgresql:
      # Workshop hub: 1 replica saves CPU and avoids HA quorum issues on small clusters.
      replicaCount: 1
      openshiftUid: "1000910000"
      podSecurityContext:
        enabled: true
        fsGroup: 1000910000
      containerSecurityContext:
        enabled: true
        runAsUser: 1000910000
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    pgpool:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi
  valkey-cluster:
    enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
