clusterDomain: ""

# Industrial Edge Skupper listeners (ie-gateway, ie-api, kafka stormshift/datalake).
# Disabled by default — AI Computer Vision at the Edge uses neuroface-cv Kafka instead.
industrialEdge:
  enabled: false

namespace: service-interconnect

# Hub-only: push Skupper AccessTokens to spokes via ManagedClusterAction (sensitive
# grant code/url/ca never committed — read from AccessGrant status at runtime).
accessTokenSync:
  enabled: true
  grantName: spoke-link
  tokenName: hub-link
  clusters: "east,west"
  schedule: "*/30 * * * *"
  image: registry.redhat.io/ubi9/python-311:latest

# Repair missing prometheus-auth-proxy + Skupper connectors on spokes (Grafana east/west).
spokeMetricsSync:
  enabled: true
  schedule: "*/20 * * * *"
  image: registry.redhat.io/ubi9/python-311:latest
  prometheusProxyImage: quay.io/rhpds/nginx:1.25
  clusters:
    - east
    - west
