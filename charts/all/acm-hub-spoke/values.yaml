clusterDomain: ""
gitops:
  repoUrl: ""
  revision: "main"
  strategies:
    push:
      enabled: true
      applicationSetName: fleet-spoke-push
      componentIds:
        - operators-platform
    pull:
      enabled: true
clusters:
  hub:
    domain: ""
  east:
    domain: ""
  west:
    domain: ""

# Managed Clusters for ACM auto-import
# Set apiUrl and token to enable auto-registration of spoke clusters
# The token should be a service account token with cluster-admin privileges
# Example:
#   east:
#     apiUrl: "https://api.east-cluster.example.com:6443"
#     domain: "apps.east-cluster.example.com"
#     token: "sha256~xxxxx"
managedClusters:
  east:
    apiUrl: ""
    domain: ""
    token: ""
  west:
    apiUrl: ""
    domain: ""
    token: ""
