{{- if .Values.ppeRetrainWorkbench.enabled }}
{{- $wb := .Values.ppeRetrainWorkbench -}}
{{- $domain := include "neuroface.hubClusterDomain" . -}}
{{- $host := $wb.route.host | default (printf "ppe-retrain-workbench.%s" $domain) -}}
{{- $ppeEndpoint := include "neuroface.ppeEndpoint" . -}}
{{- $ms := .Values.yoloPpeServing.modelStorage | default dict -}}
{{- $endpoint := include "neuroface.minioEndpoint" . -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $wb.name }}-notebook
  namespace: neuroface
  labels:
    app.kubernetes.io/part-of: neuroface
    app.kubernetes.io/component: ppe-retrain-workbench
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  ppe-retrain.ipynb: |
{{ .Files.Get "files/notebooks/ppe-retrain.ipynb" | indent 4 }}
---
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: {{ $wb.name }}
  namespace: neuroface
  labels:
    app.kubernetes.io/part-of: neuroface
    app.kubernetes.io/component: ppe-retrain-workbench
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    opendatahub.io/username: workshop
    notebooks.opendatahub.io/last-image-selection: {{ $wb.image | quote }}
    notebooks.opendatahub.io/last-size-selection: "Large"
spec:
  template:
    spec:
      containers:
        - name: {{ $wb.name }}
          image: {{ $wb.image | quote }}
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: {{ $wb.cpu | quote }}
              memory: {{ $wb.memory | quote }}
            limits:
              cpu: {{ $wb.cpu | quote }}
              memory: {{ $wb.memory | quote }}
          env:
            - name: PPE_ENDPOINT
              value: {{ $ppeEndpoint | quote }}
            - name: AWS_ACCESS_KEY_ID
              value: {{ $ms.accessKeyId | default "minio" | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ $ms.secretAccessKey | default "minio123" | quote }}
            - name: AWS_DEFAULT_REGION
              value: {{ $ms.region | default "us-east-1" | quote }}
            - name: AWS_S3_BUCKET
              value: {{ $ms.bucket | default "models" | quote }}
            - name: AWS_S3_ENDPOINT
              value: {{ $endpoint | quote }}
            - name: PPE_MODEL_PREFIX
              value: {{ .Values.yoloPpeServing.storagePath | default "ppe-detection/model" | quote }}
            - name: PPE_DATA_PREFIX
              value: ppe-detection/training-data
          volumeMounts:
            - name: notebook-src
              mountPath: /opt/app-root/src/ppe-retrain.ipynb
              subPath: ppe-retrain.ipynb
            - name: notebook-data
              mountPath: /opt/app-root/src/training-data
      volumes:
        - name: notebook-src
          configMap:
            name: {{ $wb.name }}-notebook
        - name: notebook-data
          emptyDir: {}
{{- if $wb.route.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ $wb.name }}
  namespace: neuroface
  labels:
    app.kubernetes.io/part-of: neuroface
    app.kubernetes.io/component: ppe-retrain-workbench
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    haproxy.router.openshift.io/timeout: 300s
spec:
  host: {{ $host | quote }}
  to:
    kind: Service
    name: {{ $wb.name }}
    weight: 100
  port:
    targetPort: notebook-port
  tls:
    termination: edge
  wildcardPolicy: None
{{- end }}
{{- end }}
