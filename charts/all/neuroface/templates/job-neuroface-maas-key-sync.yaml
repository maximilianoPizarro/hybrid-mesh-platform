apiVersion: v1
kind: ServiceAccount
metadata:
  name: neuroface-maas-key-sync
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: neuroface-maas-key-sync
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["neuroface-maas-api-key"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: neuroface-maas-key-sync-kairos
  namespace: kairos-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["kairos-ai-credentials"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: neuroface-maas-key-sync-kairos
  namespace: kairos-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: neuroface-maas-key-sync-kairos
subjects:
  - kind: ServiceAccount
    name: neuroface-maas-key-sync
    namespace: neuroface
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: neuroface-maas-key-sync
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: neuroface-maas-key-sync
subjects:
  - kind: ServiceAccount
    name: neuroface-maas-key-sync
    namespace: neuroface
---
apiVersion: batch/v1
kind: Job
metadata:
  name: neuroface-maas-key-sync
  namespace: neuroface
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "3"
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: neuroface-maas-key-sync
      containers:
        - name: sync
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              KEY=$(oc get secret neuroface-maas-api-key -n neuroface -o jsonpath='{.data.api-key}' | base64 -d)
              if [ -z "${KEY}" ] || [ "${KEY}" = "CHANGEME-inject-via-RHDP" ]; then
                echo "neuroface-maas-api-key placeholder — copying from kairos-ai-credentials"
                KEY=$(oc get secret kairos-ai-credentials -n kairos-system -o jsonpath='{.data.api-key}' | base64 -d)
                if [ -z "${KEY}" ]; then
                  echo "kairos-ai-credentials missing — create maas-facilitator-seed in vault and refresh vault-maas-external-secrets" >&2
                  exit 1
                fi
                oc patch secret neuroface-maas-api-key -n neuroface --type=merge \
                  -p "{\"stringData\":{\"api-key\":\"${KEY}\"}}"
              fi
              HAS_KEY=$(oc get deploy neuroface-backend -n neuroface -o jsonpath='{.spec.template.spec.containers[0].env[*].name}' 2>/dev/null | tr ' ' '\n' | grep -Fx NEUROFACE_CHAT_API_KEY && echo yes || echo no)
              if [ "$HAS_KEY" != "yes" ]; then
                oc patch deployment neuroface-backend -n neuroface --type=json -p='[
                  {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{
                    "name":"NEUROFACE_CHAT_API_KEY",
                    "valueFrom":{"secretKeyRef":{"name":"neuroface-maas-api-key","key":"api-key"}}
                  }}
                ]' 2>/dev/null || oc patch deployment neuroface-backend -n neuroface --type=json -p='[
                  {"op":"add","path":"/spec/template/spec/containers/0/env","value":[
                    {"name":"NEUROFACE_CHAT_API_KEY","valueFrom":{"secretKeyRef":{"name":"neuroface-maas-api-key","key":"api-key"}}}
                  ]}
                ]'
              fi
              oc rollout status deployment/neuroface-backend -n neuroface --timeout=180s
              echo "neuroface-backend wired to neuroface-maas-api-key"
