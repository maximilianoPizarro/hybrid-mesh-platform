{{- if .Values.ppeWorkbench.enabled }}
{{- $wb := .Values.ppeWorkbench -}}
{{- $domain := include "neuroface.hubClusterDomain" . -}}
{{- $host := $wb.route.host | default (printf "ppe-workbench.%s" $domain) -}}
{{- $ppeEndpoint := .Values.neuroface.ppe.endpoint | default "http://yolo-ppe-serving:8080" -}}
{{- $neurofaceHost := .Values.neuroface.route.host | default (printf "neuroface.%s" $domain) -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $wb.name }}-notebook
  namespace: neuroface
  labels:
    app.kubernetes.io/part-of: neuroface
    app.kubernetes.io/component: ppe-workbench
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  ppe-detection.ipynb: |
{{ .Files.Get "files/notebooks/ppe-detection.ipynb" | indent 4 }}
---
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: {{ $wb.name }}
  namespace: neuroface
  labels:
    app.kubernetes.io/part-of: neuroface
    app.kubernetes.io/component: ppe-workbench
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    opendatahub.io/username: workshop
    notebooks.opendatahub.io/last-image-selection: {{ $wb.image | quote }}
    notebooks.opendatahub.io/last-size-selection: "Standard"
spec:
  template:
    spec:
      containers:
        - name: {{ $wb.name }}
          image: {{ $wb.image | quote }}
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: {{ $wb.cpu | quote }}
              memory: {{ $wb.memory | quote }}
            limits:
              cpu: {{ $wb.cpu | quote }}
              memory: {{ $wb.memory | quote }}
          env:
            - name: PPE_ENDPOINT
              value: {{ $ppeEndpoint | quote }}
            - name: PPE_CLASSES
              value: {{ .Values.neuroface.ppe.classes | default "hardhat,safety-vest,goggles" | quote }}
            - name: PPE_CONFIDENCE
              value: {{ .Values.neuroface.ppe.confidence | default "0.5" | quote }}
            - name: NEUROFACE_URL
              value: {{ printf "https://%s" $neurofaceHost | quote }}
          volumeMounts:
            - name: notebook-src
              mountPath: /opt/app-root/src/ppe-detection.ipynb
              subPath: ppe-detection.ipynb
            - name: notebook-data
              mountPath: /opt/app-root/src/uploads
            - name: notebook-models
              mountPath: /opt/app-root/src/models
      volumes:
        - name: notebook-src
          configMap:
            name: {{ $wb.name }}-notebook
        - name: notebook-data
          emptyDir: {}
        - name: notebook-models
          emptyDir: {}
{{- if $wb.route.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ $wb.name }}
  namespace: neuroface
  labels:
    app.kubernetes.io/part-of: neuroface
    app.kubernetes.io/component: ppe-workbench
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    haproxy.router.openshift.io/timeout: 300s
spec:
  host: {{ $host | quote }}
  to:
    kind: Service
    name: {{ $wb.name }}
    weight: 100
  port:
    targetPort: notebook-port
  tls:
    termination: edge
  wildcardPolicy: None
{{- end }}
{{- end }}
