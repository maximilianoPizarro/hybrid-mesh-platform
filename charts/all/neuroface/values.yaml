clusterDomain: ""

neuroface:
  fullnameOverride: neuroface
  backend:
    image:
      tag: v1.4.0
  frontend:
    image:
      tag: v1.4.0
  chat:
    enabled: true
    autoServiceAccount: false
    modelEndpoint: "https://maas-rhdp.apps.maas.redhatworkshops.io/v1"
    modelName: "llama-scout-17b"
    apiKey: ""
  ovms:
    enabled: false
    replicas: 1
    modelName: "face-detection-retail-0005"
  litellm:
    enabled: false
  ppe:
    enabled: true
    # Hub-local YOLO InferenceService (KServe v1.4.1).
    # CV gateway (neuroface-cv.<hub>) handles federated 50/50 east/west separately.
    useFederatedGateway: false
    # Injected into neuroface-config ConfigMap as NEUROFACE_PPE_* (backend envFrom).
    endpoint: "http://yolo-ppe-serving:8080"
    classes: "hardhat,safety-vest,goggles"
    confidence: "0.5"
    serving:
      image:
        repository: quay.io/maximilianopizarro/neuroface-ppe-serving
        tag: v1.4.1
    kafka:
      enabled: false
    dataPersistence:
      enabled: true
      s3Endpoint: "http://minio.industrial-edge-ml-workspace.svc:9000"
      s3Bucket: "models"
      s3Prefix: "ppe-detection/training-data"
      s3AccessKey: "minio"
      s3SecretKey: "minio123"
      s3Secure: false
      samplingRate: 1.0
  route:
    enabled: true
    host: ""

yoloPpeServing:
  enabled: true
  replicas: 1
  image: quay.io/maximilianopizarro/neuroface-ppe-serving:v1.4.1
  modelFile: best.pt
  storageSecretName: aws-connection-ppe-models
  storagePath: ppe-detection/model
  modelStorage:
    accessKeyId: minio
    secretAccessKey: minio123
    region: us-east-1
    bucket: models
    endpoint: http://minio.industrial-edge-ml-workspace.svc:9000
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 3Gi

ppeWorkbench:
  enabled: true
  name: ppe-workbench
  image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/pytorch:2025.1
  cpu: "1"
  memory: 2Gi
  route:
    enabled: true
    host: ""

ppeRetrainWorkbench:
  enabled: true
  name: ppe-retrain-workbench
  image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/pytorch:2025.1
  cpu: "2"
  memory: 4Gi
  route:
    enabled: true
    host: ""
