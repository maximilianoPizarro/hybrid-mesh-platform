apiVersion: v1
kind: ServiceAccount
metadata:
  name: apikey-secret-provisioner
  namespace: developer-portal-controller-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: apikey-secret-provisioner
rules:
  - apiGroups: [devportal.kuadrant.io]
    resources: [apikeys]
    verbs: [get, list, watch, patch]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: apikey-secret-provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: apikey-secret-provisioner
subjects:
  - kind: ServiceAccount
    name: apikey-secret-provisioner
    namespace: developer-portal-controller-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: apikey-secret-provisioner
  namespace: developer-portal-controller-system
  labels:
    app.kubernetes.io/name: developer-portal-controller
    app.kubernetes.io/component: secret-provisioner
spec:
  schedule: "* * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120
      template:
        spec:
          serviceAccountName: apikey-secret-provisioner
          restartPolicy: OnFailure
          containers:
            - name: provisioner
              image: registry.redhat.io/openshift4/ose-cli:latest
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail

                  echo "Scanning for APIKeys missing consumer secret..."
                  APIKEYS=$(oc get apikeys -A -o json | python3 -c "
                  import sys, json
                  data = json.load(sys.stdin)
                  for item in data.get('items', []):
                      spec = item.get('spec', {})
                      status = item.get('status', {})
                      meta = item.get('metadata', {})
                      ns = meta.get('namespace', '')
                      name = meta.get('name', '')

                      conditions = status.get('conditions', [])
                      approved = any(c.get('type') == 'Approved' and c.get('status') == 'True' for c in conditions)

                      secret_ref = spec.get('secretRef', {}).get('name', '')

                      if not secret_ref:
                          print(f'{ns}/{name}')
                  ")

                  if [ -z "$APIKEYS" ]; then
                    echo "No APIKeys missing consumer secret."
                    exit 0
                  fi

                  for AK in $APIKEYS; do
                    NS="${AK%%/*}"
                    NAME="${AK##*/}"
                    SECRET_NAME="${NAME}-consumer"
                    echo "Processing $NS/$NAME -> secret $SECRET_NAME"

                    if oc get secret "$SECRET_NAME" -n "$NS" &>/dev/null; then
                      echo "  Secret $SECRET_NAME already exists, patching secretRef..."
                    else
                      KEY=$(python3 -c "import secrets; print(secrets.token_urlsafe(32))")
                      echo "  Creating consumer secret $SECRET_NAME with generated key"
                      oc create secret generic "$SECRET_NAME" -n "$NS" \
                        --from-literal=api_key="$KEY" \
                        --dry-run=client -o yaml | oc apply -f -
                    fi

                    echo "  Patching APIKey $NAME with secretRef"
                    oc patch apikey "$NAME" -n "$NS" --type merge \
                      -p "{\"spec\":{\"secretRef\":{\"name\":\"$SECRET_NAME\"}}}"

                    echo "  Done: $NS/$NAME"
                  done

                  echo "Provisioning complete."
