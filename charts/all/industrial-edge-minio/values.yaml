clusterDomain: ""
global:
  localClusterDomain: ""
  hubClusterDomain: ""
minioAccessKey: "minio"
minioSecretKey: "minio123"
bucketInit:
  enabled: true
  image: quay.io/minio/mc:latest
  buckets:
    - quay
    - kubecost
    - models
# PostSync Job: trains a small CPU sklearn model and uploads to s3://models/anomaly-detection/model/
# for KServe RawDeployment (hub workshop-sklearn + optional spoke anomaly-detection).
modelSeed:
  enabled: true
  bucket: models
  image: registry.redhat.io/ubi9/python-311:latest
# PostSync Job: downloads YOLO PPE best.pt from HuggingFace → s3://models/ppe-detection/model/
ppeModelSeed:
  enabled: true
  bucket: models
  modelRepo: Hexmon/vyra-yolo-ppe-detection
  modelFile: best.pt
  image: registry.redhat.io/ubi9/python-311:latest
