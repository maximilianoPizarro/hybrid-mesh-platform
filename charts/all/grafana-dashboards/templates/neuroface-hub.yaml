apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: neuroface-hub
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "title": "AI Computer Vision at the Edge",
      "tags": ["neuroface", "ai-cv", "ppe", "kserve", "computer-vision"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 3,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {"type": "row", "title": "NeuroFace Hub", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}, "id": 100},
        {
          "type": "stat",
          "title": "NeuroFace pods ready",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 1},
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "targets": [
            {"expr": "count(kube_pod_status_ready{namespace=\"neuroface\",condition=\"true\"}) or vector(0)", "legendFormat": "Ready", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "short"}},
          "options": {"colorMode": "value", "graphMode": "none"}
        },
        {
          "type": "timeseries",
          "title": "CPU usage by container",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 1},
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "targets": [
            {"expr": "sum by (container) (rate(container_cpu_usage_seconds_total{namespace=\"neuroface\",container=~\"neuroface-backend|neuroface-frontend|yolo-ppe.*\"}[5m]))", "legendFormat": "{{container}}", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "type": "timeseries",
          "title": "Memory by container",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 1},
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "targets": [
            {"expr": "sum by (container) (container_memory_working_set_bytes{namespace=\"neuroface\",container=~\"neuroface-backend|neuroface-frontend|yolo-ppe.*\"})", "legendFormat": "{{container}}", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {"type": "row", "title": "PPE Inference", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 9}, "id": 200},
        {
          "type": "timeseries",
          "title": "Istio request rate (neuroface ns)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 10},
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "targets": [
            {"expr": "sum(rate(istio_requests_total{destination_service_namespace=\"neuroface\"}[5m])) or vector(0)", "legendFormat": "req/s", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "type": "timeseries",
          "title": "YOLO PPE pod restarts",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 10},
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "targets": [
            {"expr": "sum by (pod) (kube_pod_container_status_restarts_total{namespace=\"neuroface\",pod=~\"yolo-ppe.*\"})", "legendFormat": "{{pod}}", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {"type": "row", "title": "CV Gateway", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 18}, "id": 300},
        {
          "type": "timeseries",
          "title": "CV gateway — total req/s",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 19},
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "targets": [
            {"expr": "sum(rate(istio_requests_total{source_workload=\"neuroface-gateway-istio\",reporter=\"source\"}[5m])) or vector(0)", "legendFormat": "total req/s", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "type": "timeseries",
          "title": "Gateway split — east vs west",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 19},
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "targets": [
            {"expr": "sum(rate(istio_requests_total{source_workload=\"neuroface-gateway-istio\",destination_service=~\"neuroface-cv-east.*\"}[5m])) or vector(0)", "legendFormat": "east", "refId": "A"},
            {"expr": "sum(rate(istio_requests_total{source_workload=\"neuroface-gateway-istio\",destination_service=~\"neuroface-cv-west.*\"}[5m])) or vector(0)", "legendFormat": "west", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        }
      ],
      "templating": {
        "list": [
          {"name": "ds_hub", "type": "datasource", "query": "prometheus", "current": {"text": "Prometheus", "value": "Prometheus"}}
        ]
      },
      "uid": "neuroface-hub"
    }
