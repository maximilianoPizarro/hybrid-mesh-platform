apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: neuroface-hub
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "title": "AI Computer Vision at the Edge — NeuroFace (hub)",
      "tags": ["neuroface", "ai-cv", "ppe", "kserve"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 2,
      "panels": [
        {"type": "row", "title": "NeuroFace API", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}, "id": 1},
        {
          "type": "timeseries",
          "title": "PPE / API request rate (neuroface ns)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 1},
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "targets": [
            {"expr": "sum(rate(istio_requests_total{destination_service_namespace=\"neuroface\"}[5m])) or vector(0)", "legendFormat": "istio req/s", "refId": "A"},
            {"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"neuroface\",container=~\"neuroface-backend|neuroface-frontend\"}[5m]))", "legendFormat": "{{container}} CPU", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "type": "timeseries",
          "title": "Container memory (neuroface pods)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 1},
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "targets": [
            {"expr": "sum by (container) (container_memory_working_set_bytes{namespace=\"neuroface\",container=~\"neuroface-backend|neuroface-frontend|yolo-ppe.*\"})", "legendFormat": "{{container}}", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {"type": "row", "title": "KServe YOLO PPE", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 9}, "id": 2},
        {
          "type": "timeseries",
          "title": "YOLO PPE serving — CPU usage",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 10},
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "targets": [
            {"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"neuroface\",pod=~\"yolo-ppe.*\"}[5m]))", "legendFormat": "CPU cores", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "type": "stat",
          "title": "NeuroFace pods ready",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 10},
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "targets": [
            {"expr": "count(kube_pod_status_ready{namespace=\"neuroface\",condition=\"true\"})", "legendFormat": "Ready", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "short"}},
          "options": {"colorMode": "value", "graphMode": "none"}
        }
      ],
      "templating": {
        "list": [
          {"name": "ds_hub", "type": "datasource", "query": "prometheus", "current": {"text": "Prometheus", "value": "Prometheus"}}
        ]
      }
    }
