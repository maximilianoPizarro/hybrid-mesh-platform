apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: industrial-edge
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 2,
      "id": null,
      "links": [],
      "panels": [
        {"collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}, "id": 100, "title": "Hub Industrial Edge Gateway", "type": "row"},
        {
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 15, "lineWidth": 2, "showPoints": "never"}, "unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 1},
          "id": 1,
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"expr": "sum(rate(istio_requests_total{source_workload=\"hub-gateway-istio\",reporter=\"source\"}[5m]))", "legendFormat": "hub-gateway req/s", "refId": "A"},
            {"expr": "sum(rate(istio_requests_total{source_workload=\"hub-gateway-istio\",response_code=~\"5..\"}[5m]))", "legendFormat": "hub-gateway 5xx/s", "refId": "B"}
          ],
          "title": "Hub IE route traffic",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never"}, "unit": "Bps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 1},
          "id": 2,
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"expr": "sum(rate(istio_tcp_sent_bytes_total{job=\"ztunnel/ztunnel-metrics\",namespace=\"hub-gateway-system\"}[5m]))", "legendFormat": "hub-gateway ztunnel bytes/s", "refId": "A"},
            {"expr": "sum(rate(istio_tcp_connections_opened_total{job=\"ztunnel/ztunnel-metrics\",namespace=\"hub-gateway-system\"}[5m]))", "legendFormat": "hub-gateway L4 conn/s", "refId": "B"}
          ],
          "title": "Hub gateway ztunnel (Skupper path)",
          "type": "timeseries"
        },
        {"collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 9}, "id": 200, "title": "Spoke Kafka — Industrial Edge tst", "type": "row"},
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 15, "lineWidth": 2, "showPoints": "never"}, "unit": "ops"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 10},
          "id": 3,
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"datasource": {"type": "prometheus", "uid": "${ds_east}"}, "expr": "sum(kafka_server_brokertopicmetrics_messagesinpersec{topic=~\"temperature|vibration\"})", "legendFormat": "East IE topics msg/s", "refId": "A"},
            {"datasource": {"type": "prometheus", "uid": "${ds_west}"}, "expr": "sum(kafka_server_brokertopicmetrics_messagesinpersec{topic=~\"temperature|vibration\"})", "legendFormat": "West IE topics msg/s", "refId": "B"}
          ],
          "title": "MQTT→Kafka throughput (temperature / vibration)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never"}, "unit": "Bps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 10},
          "id": 4,
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"datasource": {"type": "prometheus", "uid": "${ds_east}"}, "expr": "sum(kafka_server_brokertopicmetrics_bytesinpersec{topic=~\"temperature|vibration\"})", "legendFormat": "East bytes in/s", "refId": "A"},
            {"datasource": {"type": "prometheus", "uid": "${ds_west}"}, "expr": "sum(kafka_server_brokertopicmetrics_bytesinpersec{topic=~\"temperature|vibration\"})", "legendFormat": "West bytes in/s", "refId": "B"}
          ],
          "title": "IE Kafka topic bytes in",
          "type": "timeseries"
        },
        {"collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 18}, "id": 300, "title": "Spoke mesh — line-dashboard path", "type": "row"},
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never"}, "unit": "Bps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 19},
          "id": 5,
          "options": {"legend": {"displayMode": "table", "placement": "right", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"datasource": {"type": "prometheus", "uid": "${ds_east}"}, "expr": "sum(rate(istio_tcp_sent_bytes_total{job=\"ztunnel/ztunnel-metrics\",namespace=\"industrial-edge-tst-all\"}[5m]))", "legendFormat": "East IE namespace ztunnel", "refId": "A"},
            {"datasource": {"type": "prometheus", "uid": "${ds_west}"}, "expr": "sum(rate(istio_tcp_sent_bytes_total{job=\"ztunnel/ztunnel-metrics\",namespace=\"industrial-edge-tst-all\"}[5m]))", "legendFormat": "West IE namespace ztunnel", "refId": "B"},
            {"datasource": {"type": "prometheus", "uid": "${ds_east}"}, "expr": "sum(rate(istio_tcp_sent_bytes_total{job=\"ztunnel/ztunnel-metrics\",namespace=\"spoke-gateway-system\"}[5m]))", "legendFormat": "East spoke-gateway ztunnel", "refId": "C"},
            {"datasource": {"type": "prometheus", "uid": "${ds_west}"}, "expr": "sum(rate(istio_tcp_sent_bytes_total{job=\"ztunnel/ztunnel-metrics\",namespace=\"spoke-gateway-system\"}[5m]))", "legendFormat": "West spoke-gateway ztunnel", "refId": "D"}
          ],
          "title": "Spoke ztunnel traffic (IE + spoke-gateway)",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["industrial-edge", "kafka", "hub-gateway", "iot", "multi-cluster"],
      "templating": {
        "list": [
          {"current": {"selected": false, "text": "Prometheus", "value": "Prometheus"}, "hide": 0, "includeAll": false, "label": "Hub", "multi": false, "name": "ds_hub", "options": [], "query": "prometheus", "refresh": 1, "regex": "/^Prometheus$/", "skipUrlSync": false, "type": "datasource"},
          {"current": {"selected": false, "text": "Prometheus-East", "value": "Prometheus-East"}, "hide": 0, "includeAll": false, "label": "East", "multi": false, "name": "ds_east", "options": [], "query": "prometheus", "refresh": 1, "regex": "/East/", "skipUrlSync": false, "type": "datasource"},
          {"current": {"selected": false, "text": "Prometheus-West", "value": "Prometheus-West"}, "hide": 0, "includeAll": false, "label": "West", "multi": false, "name": "ds_west", "options": [], "query": "prometheus", "refresh": 1, "regex": "/West/", "skipUrlSync": false, "type": "datasource"}
        ]
      },
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "title": "Industrial Edge — Hub Gateway & Spoke Kafka",
      "uid": "industrial-edge",
      "version": 1
    }
