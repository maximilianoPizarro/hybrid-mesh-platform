apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: neuroface-cv
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 2,
      "id": null,
      "links": [],
      "panels": [
        {"collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}, "id": 100, "title": "Hub Gateway", "type": "row"},
        {
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 15, "lineWidth": 2, "showPoints": "never"}, "unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 1},
          "id": 1,
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"expr": "sum(rate(istio_requests_total{source_workload=\"neuroface-gateway-istio\",reporter=\"source\"}[5m]))", "legendFormat": "total req/s", "refId": "A"}
          ],
          "title": "NeuroFace CV gateway — total req/s",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 15, "lineWidth": 2, "showPoints": "never"}, "unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 1},
          "id": 2,
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"expr": "sum(rate(istio_requests_total{source_workload=\"neuroface-gateway-istio\",destination_service=~\"neuroface-cv-east.*\"}[5m]))", "legendFormat": "east backend", "refId": "A"},
            {"expr": "sum(rate(istio_requests_total{source_workload=\"neuroface-gateway-istio\",destination_service=~\"neuroface-cv-west.*\"}[5m]))", "legendFormat": "west backend", "refId": "B"}
          ],
          "title": "Gateway split — east vs west",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never"}, "unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 1},
          "id": 3,
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{source_workload=\"neuroface-gateway-istio\",reporter=\"source\"}[5m])) by (le)) / 1000", "legendFormat": "p50", "refId": "A"},
            {"expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{source_workload=\"neuroface-gateway-istio\",reporter=\"source\"}[5m])) by (le)) / 1000", "legendFormat": "p95", "refId": "B"}
          ],
          "title": "Gateway latency (p50 / p95)",
          "type": "timeseries"
        },
        {"collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 9}, "id": 200, "title": "PPE Inference", "type": "row"},
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 15, "lineWidth": 2, "showPoints": "never"}, "unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 10},
          "id": 4,
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"datasource": {"type": "prometheus", "uid": "${ds_east}"}, "expr": "sum(rate(istio_requests_total{destination_workload=\"yolo-ppe-serving\",destination_service_namespace=\"neuroface-cv\"}[5m]))", "legendFormat": "east PPE req/s", "refId": "A"},
            {"datasource": {"type": "prometheus", "uid": "${ds_west}"}, "expr": "sum(rate(istio_requests_total{destination_workload=\"yolo-ppe-serving\",destination_service_namespace=\"neuroface-cv\"}[5m]))", "legendFormat": "west PPE req/s", "refId": "B"}
          ],
          "title": "PPE inference req/s (spokes)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never"}, "unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 10},
          "id": 5,
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"datasource": {"type": "prometheus", "uid": "${ds_east}"}, "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{destination_workload=\"yolo-ppe-serving\",destination_service_namespace=\"neuroface-cv\"}[5m])) by (le)) / 1000", "legendFormat": "east p95", "refId": "A"},
            {"datasource": {"type": "prometheus", "uid": "${ds_west}"}, "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{destination_workload=\"yolo-ppe-serving\",destination_service_namespace=\"neuroface-cv\"}[5m])) by (le)) / 1000", "legendFormat": "west p95", "refId": "B"}
          ],
          "title": "PPE inference response time (p95)",
          "type": "timeseries"
        },
        {"collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 18}, "id": 300, "title": "Service Mesh", "type": "row"},
        {
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never"}, "unit": "Bps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 19},
          "id": 6,
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"expr": "sum(rate(istio_tcp_sent_bytes_total{namespace=\"neuroface-gateway-system\"}[5m]))", "legendFormat": "gateway bytes/s", "refId": "A"}
          ],
          "title": "Mesh bytes (hub gateway namespace)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never"}, "unit": "cps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 19},
          "id": 7,
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"expr": "sum(rate(istio_tcp_connections_opened_total{namespace=\"neuroface-gateway-system\"}[5m]))", "legendFormat": "connections/s", "refId": "A"}
          ],
          "title": "Mesh connections opened/s",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never"}, "unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 19},
          "id": 8,
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"expr": "sum(rate(istio_requests_total{source_workload=\"neuroface-gateway-istio\",response_code=~\"5..\"}[5m])) / sum(rate(istio_requests_total{source_workload=\"neuroface-gateway-istio\"}[5m]))", "legendFormat": "5xx error rate", "refId": "A"}
          ],
          "title": "Gateway error rate",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["neuroface", "computer-vision", "ppe", "hub-gateway", "multi-cluster"],
      "templating": {
        "list": [
          {"current": {"selected": false, "text": "Prometheus", "value": "Prometheus"}, "hide": 0, "includeAll": false, "label": "Hub", "multi": false, "name": "ds_hub", "options": [], "query": "prometheus", "refresh": 1, "regex": "/^Prometheus$/", "skipUrlSync": false, "type": "datasource"},
          {"current": {"selected": false, "text": "Prometheus-East", "value": "Prometheus-East"}, "hide": 0, "includeAll": false, "label": "East", "multi": false, "name": "ds_east", "options": [], "query": "prometheus", "refresh": 1, "regex": "/East/", "skipUrlSync": false, "type": "datasource"},
          {"current": {"selected": false, "text": "Prometheus-West", "value": "Prometheus-West"}, "hide": 0, "includeAll": false, "label": "West", "multi": false, "name": "ds_west", "options": [], "query": "prometheus", "refresh": 1, "regex": "/West/", "skipUrlSync": false, "type": "datasource"}
        ]
      },
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "title": "NeuroFace CV — Participants",
      "uid": "neuroface-cv",
      "version": 1
    }
