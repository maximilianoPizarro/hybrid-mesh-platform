# Showroom Lab Guide Configuration
showroom:
  enabled: true
  namespace: showroom
  name: showroom

  # Lab guide Git repository
  content:
    repoUrl: "https://github.com/maximilianoPizarro/showroom-hybrid-mesh-ai.git"
    repoRef: "main"
    antoraPlaybook: "site.yml"
    image: "quay.io/rhpds/showroom-content:v1.3.1"

  nookbag:
    enabled: false

  # Terminal configuration
  terminal:
    enabled: true
    image: "quay.io/rhpds/openshift-showroom-terminal-ocp:latest"
    # Match platform-users.userCount for workshop-lab-reader bindings
    userCount: 50
    # Namespaces lab modules inspect with oc (Showroom SA + userN after hub-login)
    workshopNamespaces:
      - workshop-kuadrant-apis
      - ai-gateway-system
      - developer-hub
      - mcp-system
      - industrial-edge-tst-all
      - maas-workshop
      - neuroface
      - cnv-workshop
      - hub-gateway-system
      - gitea
      - openshift-gitops
      - stackrox
      - kairos-system
      - vault
      - redhat-connectivity-link-operator
      - kuadrant-system
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

# Injected by parent chart
deployer:
  domain: ""

clusters:
  hub:
    domain: ""
    apiUrl: ""
  east:
    domain: ""
    apiUrl: ""
  west:
    domain: ""
    apiUrl: ""

registration:
  url: ""

demo:
  namespace: ""
  appName: ""
