name: Helm Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.15.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install pyyaml
      - name: Build chart dependencies
        run: |
          for chart in charts/all/*/Chart.yaml; do
            dir=$(dirname "$chart")
            if grep -q 'dependencies:' "$chart"; then
              helm dependency build "$dir" 2>/dev/null || true
            fi
          done
      - name: Lint all component charts
        run: |
          set -e
          for chart in charts/all/*/Chart.yaml; do
            helm lint "$(dirname "$chart")"
          done
      - name: Template key charts
        run: |
          helm template test charts/all/operators-edge --set clusterRole=spoke
          helm template test charts/all/spoke-meta-push \
            --set clusterName=east --set gitops.repoUrl=https://github.com/example/hybrid-mesh-platform.git
          helm template test charts/all/acm-hub-spoke \
            --set gitops.repoUrl=https://github.com/example/hybrid-mesh-platform.git
          helm template test charts/all/skupper-network-observer \
            --set global.localClusterDomain=apps.example.com
      - name: Argo preflight
        run: bash scripts/argocd-preflight.sh
      - name: GitOps strategy partition
        run: python scripts/verify-gitops-strategies.py
