---
name: Interop Tests (VP-style)

on:
  workflow_dispatch:
    inputs:
      hub_domain:
        description: "Hub apps domain (e.g. apps.cluster-xxx.redhatworkshops.io)"
        required: true
        type: string
      infra_provider:
        description: "Infrastructure provider (RHDP, AWS, GCP, Azure)"
        required: true
        default: RHDP
        type: string
      skip_edge:
        description: "Skip edge spoke tests"
        required: false
        default: "false"
        type: boolean

jobs:
  interop:
    name: Hybrid Mesh Platform — VP Interop Tests
    runs-on: ubuntu-latest
    env:
      HUB_APPS_DOMAIN: ${{ inputs.hub_domain }}
      INFRA_PROVIDER: ${{ inputs.infra_provider }}
      EXTERNAL_TEST: "true"
      PATTERN_NAME: HybridMeshPlatform
      PATTERN_SHORTNAME: hybrid-mesh

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2f # v5.3.0
        with:
          python-version: "3.11"

      - name: Install oc client
        run: |
          mkdir -p "$HOME/oc_client"
          curl -sL "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz" \
            | tar -xz -C "$HOME/oc_client" oc
          echo "$HOME/oc_client" >> "$GITHUB_PATH"
          oc version --client

      - name: Install Python dependencies
        working-directory: tests/interop
        run: pip install -r requirements.txt

      - name: Configure kubeconfig (hub)
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.HUB_KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/hub-config"
          export KUBECONFIG="$HOME/.kube/hub-config"
          echo "KUBECONFIG=$HOME/.kube/hub-config" >> "$GITHUB_ENV"
          oc whoami

      - name: Configure kubeconfig (east spoke)
        if: ${{ inputs.skip_edge != 'true' && secrets.EAST_KUBECONFIG_B64 != '' }}
        run: |
          echo "${{ secrets.EAST_KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/east-config"
          echo "KUBECONFIG_EDGE=$HOME/.kube/east-config" >> "$GITHUB_ENV"

      - name: Set workspace directory
        run: |
          WORKSPACE="${GITHUB_WORKSPACE}/test-results"
          mkdir -p "${WORKSPACE}"
          echo "WORKSPACE=${WORKSPACE}" >> "$GITHUB_ENV"

      - name: Run interop test suite
        working-directory: tests/interop
        run: ./run_tests.sh

      - name: Upload JUnit XML results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with:
          name: interop-test-results-${{ github.run_id }}
          path: test-results/*.xml
          retention-days: 30

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Interop Test Report
          path: test-results/*.xml
          reporter: java-junit
          fail-on-error: false
