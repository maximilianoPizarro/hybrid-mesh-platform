# Defaults for RHDP field-content. RHDP injects deployer.*, gitops.*, litemaas.*
# Per-cluster profile: set main.clusterGroupName (hub|east|west) or use path charts/region/<region>.
global:
  pattern: hybrid-mesh-platform
  singleArgoCD: true
  vpArgoNamespace: openshift-gitops
  options:
    useCSV: false
    syncPolicy: Automatic
    installPlanApproval: Automatic

main:
  clusterGroupName: hub
  multiSourceConfig:
    enabled: true
    clusterGroupChartVersion: "0.9.*"
    helmRepoUrl: https://charts.validatedpatterns.io

gitops:
  repoURL: https://github.com/maximilianoPizarro/hybrid-mesh-platform
  revision: main

all:
  enabled: false
region:
  enabled: false
