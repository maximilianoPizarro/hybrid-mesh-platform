metadata_version: "1.0"
name: hybrid-mesh-platform
description: >-
  Hub-spoke multi-cluster GitOps on OpenShift with ACM, ambient Service Mesh,
  Service Interconnect (Skupper), Red Hat Connectivity Link (RHCL/Kuadrant),
  Industrial Edge, OpenShift AI, ACS, and observability — Validated Patterns layout.
pattern_version: "1.0.0"
display_name: Hybrid Mesh Platform
repo_url: https://github.com/maximilianoPizarro/hybrid-mesh-platform
docs_repo_url: https://github.com/validatedpatterns/docs
issues_url: https://github.com/maximilianoPizarro/hybrid-mesh-platform/issues
docs_url: https://maximilianopizarro.github.io/hybrid-mesh-platform/
tier: sandbox
owners: maximilianoPizarro
requirements:
  # Hub cluster: ACM, Developer Hub, ACS Central, Grafana, etc.
  hub:
    minimum:
      # Absolute minimum for demo/testing (not recommended for production)
      workers: 3
      vcpu: 4
      memory_gib: 16
      openshift: "4.17"
    recommended:
      workers: 3
      vcpu: 8
      memory_gib: 32
      openshift: "4.17+"
    compute:
      platform:
        aws:
          replicas: 3
          type: m5.2xlarge  # 8 vCPU, 32 GiB
        azure:
          replicas: 3
          type: Standard_D8s_v3  # 8 vCPU, 32 GiB
        gcp:
          replicas: 3
          type: n1-standard-8  # 8 vCPU, 30 GiB
    controlPlane:
      platform:
        aws:
          replicas: 3
          type: m5.xlarge
        azure:
          replicas: 3
          type: Standard_D4s_v3
        gcp:
          replicas: 3
          type: n1-standard-4
  # Spoke clusters: Industrial Edge, ACS Secured, Skupper
  spoke:
    minimum:
      workers: 3
      vcpu: 4
      memory_gib: 16
      openshift: "4.17"
    recommended:
      workers: 3
      vcpu: 4
      memory_gib: 16
      openshift: "4.17+"
    compute:
      platform:
        aws:
          replicas: 3
          type: m5.xlarge  # 4 vCPU, 16 GiB
        azure:
          replicas: 3
          type: Standard_D4s_v3  # 4 vCPU, 16 GiB
        gcp:
          replicas: 3
          type: n1-standard-4  # 4 vCPU, 15 GiB
    controlPlane:
      platform:
        aws:
          replicas: 3
          type: m5.xlarge
        azure:
          replicas: 3
          type: Standard_D4s_v3
        gcp:
          replicas: 3
          type: n1-standard-4
extra_features:
  hypershift_support: false
  spoke_support: true
external_requirements:
  - MaaS endpoint or OpenShift AI on hub for Kairos/Lightspeed optional features
  - Workshop Showroom content remains in showroom-hybrid-mesh-ai (separate repo)
