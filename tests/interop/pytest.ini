[pytest]
# Hybrid Mesh Platform — interop test configuration

# Register custom marks to avoid PytestUnknownMarkWarning
markers =
    # Subscription tests
    subscription_status_hub: Hub operator subscription status
    subscription_status_hub_optional: Optional hub operator subscriptions (non-blocking)
    subscription_status_edge: Spoke operator subscription status
    subscription_status_edge_optional: Optional spoke subscriptions (non-blocking)

    # Hub site validation
    test_validate_hub_site_components: Hub component info dump
    validate_hub_site_reachable: Hub API endpoint reachable
    check_pod_status_hub: Hub namespace pod health check
    check_pod_status_gitlab: GitLab pod health check
    validate_acm_managed_clusters_hub: ACM spoke registration
    validate_argocd_reachable_hub_site: Hub Argo CD reachable
    validate_argocd_applications_health_hub_site: Hub ArgoCD app health

    # Edge site validation
    test_validate_edge_site_components: Edge component info dump
    validate_edge_site_reachable: Spoke API endpoint reachable
    check_pod_status_edge: Spoke namespace pod health check
    validate_argocd_reachable_edge_site: Spoke Argo CD reachable
    validate_argocd_applications_health_edge_site: Spoke ArgoCD app health
    validate_industrial_edge_pods: Industrial Edge pod health
    validate_skupper_connector_edge: Skupper connector pod health

    # Workshop HTTP surfaces
    workshop_surface_argo: ArgoCD console HTTP 200
    workshop_surface_developer_hub: Developer Hub HTTP 200
    workshop_surface_developer_hub_create: Developer Hub /create HTTP 200
    workshop_surface_gitlab: GitLab HTTP 200/302
    workshop_surface_grafana: Grafana HTTP 200
    workshop_surface_kafka_console: Kafka Console HTTP 200
    workshop_surface_neuroface: NeuroFace HTTP 200
    workshop_surface_industrial_edge: Industrial Edge hub gateway HTTP 200
    workshop_surface_skupper: Skupper observer HTTP 200
    workshop_surface_quay: Quay registry HTTP 200
    workshop_surface_vault: Vault UI HTTP 200
    workshop_surface_showroom: Showroom portal HTTP 200
    workshop_surface_mcp: MCP Gateway HTTP 200
    workshop_surface_kuadrant: Workshop APIs Kuadrant-protected (401)
    workshop_surface_ai_gateway: AI Gateway Kuadrant-protected (401)
    workshop_surface_east_devspaces: East spoke DevSpaces HTTP 200
    workshop_surface_east_line_dashboard: East spoke IE Line Dashboard HTTP 200

    # Platform-specific components
    skupper_van: Skupper VAN connected sites count
    gitlab_gateway: GitLab Istio Gateway programmed
    developer_hub_catalog: Developer Hub catalog API reachable
    developer_hub_lightspeed: Developer Hub Lightspeed endpoint
    kairos_policies: Kairos SmartScalingPolicies for GitLab
    kuadrant_api_products: Kuadrant APIProducts discoveredPlans
    kuadrant_httproutes: Kuadrant HTTPRoutes exist
    acm_fleet: ACM managed clusters Available

    # E2E GitOps roundtrip
    modify_web_content: GitOps roundtrip via showroom content update

# Logging
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s %(name)s %(levelname)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# JUnit XML
junit_family = xunit2
